<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Achievement - OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary: #ff2d7b;
    --color-secondary: #00d4ff;
    --color-accent: #ffd700;
    --color-bg: #0a0a0a;
    --font-display: 'Rajdhani', sans-serif;
    --font-body: 'Inter', sans-serif;
    --color-text: #ffffff;
    --color-primary-rgb: 255 45 123;
    --color-secondary-rgb: 0 212 255;
    --color-accent-rgb: 255 215 0;
    --color-bg-rgb: 10 10 10;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent !important;
    background-color: rgba(0,0,0,0) !important;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    height: 100vh;
    padding-top: 40px;
    font-family: var(--font-body);
    overflow: hidden;
  }

  .achievement {
    opacity: 0;
    transform: translateY(-40px) scale(0.7);
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 18px 28px 18px 20px;
    background: rgba(10,10,10,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    min-width: 380px;
    max-width: 580px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .achievement.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .achievement.hiding {
    opacity: 0;
    transform: translateY(-20px) scale(0.95);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  /* Level: minor = electric blue accent border */
  .achievement.minor {
    border-color: rgba(0, 212, 255, 0.3);
  }

  /* Level: major = magenta accent border */
  .achievement.major {
    border-color: rgba(255, 45, 123, 0.3);
  }

  /* Level: epic = gold accent border with subtle pulse */
  .achievement.epic {
    border-color: rgba(255, 215, 0, 0.4);
    animation: epicPulse 2s ease-in-out infinite;
  }

  @keyframes epicPulse {
    0%, 100% { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    50% { box-shadow: 0 2px 16px rgba(255,215,0,0.15); }
  }

  /* Icon box */
  .icon-box {
    width: 56px;
    height: 56px;
    min-width: 56px;
    background: rgba(10,10,10,0.6);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .achievement.minor .icon-box { border-color: rgba(0, 212, 255, 0.25); }
  .achievement.major .icon-box { border-color: rgba(255, 45, 123, 0.25); }
  .achievement.epic .icon-box { border-color: rgba(255, 215, 0, 0.3); }

  .icon-box svg { image-rendering: pixelated; }

  /* Text content */
  .text-content {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    z-index: 1;
  }

  .achievement-label {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 4px;
    color: #666;
    text-transform: uppercase;
  }

  .achievement.minor .achievement-label { color: var(--color-secondary); }
  .achievement.major .achievement-label { color: var(--color-primary); }
  .achievement.epic .achievement-label { color: var(--color-accent); }

  .achievement-title {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--color-text);
    line-height: 1.3;
    word-break: break-word;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .achievement.major .achievement-title { color: var(--color-primary); }
  .achievement.epic .achievement-title { color: var(--color-accent); }

  .achievement-sub {
    font-family: var(--font-body);
    font-size: 10px;
    color: #444;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .achievement.major .achievement-sub { color: #993366; }
  .achievement.epic .achievement-sub { color: #aa8800; }

  /* Shine effect for epic */
  .shine {
    display: none;
    position: absolute;
    top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.06), transparent);
    animation: shineAnim 3s ease-in-out infinite;
    z-index: 0;
  }

  .achievement.epic .shine { display: block; }

  @keyframes shineAnim {
    0% { left: -100%; }
    50% { left: 200%; }
    100% { left: 200%; }
  }

  /* Sparkle particles for epic */
  .sparkles {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 2;
  }

  .achievement.epic .sparkles { display: block; }

  .sparkle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--color-accent);
    border-radius: 50%;
    animation: sparkleFloat 2s ease-in-out infinite;
  }

  @keyframes sparkleFloat {
    0% { opacity: 0; transform: translateY(0); }
    30% { opacity: 0.9; }
    100% { opacity: 0; transform: translateY(-25px); }
  }
</style>
</head>
<body>

<div class="achievement" id="achievement">
  <div class="shine"></div>
  <div class="sparkles" id="sparkles"></div>

  <div class="icon-box">
    <svg id="icon" width="32" height="32" viewBox="0 0 16 16" style="image-rendering:pixelated"></svg>
  </div>

  <div class="text-content">
    <div class="achievement-label" id="label">ACHIEVEMENT UNLOCKED</div>
    <div class="achievement-title" id="title">Milestone!</div>
    <div class="achievement-sub" id="sub"></div>
  </div>
</div>

<script>
(function() {
  var name = 'milestone';
  var origin = window.location.origin || 'http://localhost:4000';
  window.__overlayOrigin = origin;
  window.__overlayWs = origin.replace(/^http/, 'ws');
  document.documentElement.style.visibility = 'hidden';
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return r + ' ' + g + ' ' + b;
  }
  fetch(origin + '/public/overlay-config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
      var root = document.documentElement;
      Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
      ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
        if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
      });
      var fonts = [vars['--font-display'], vars['--font-body']].filter(Boolean);
      if (fonts.length > 0) {
        var families = fonts.map(function(f) { return f.split(',')[0].replace(/'/g, '').trim(); });
        var link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=' + families.map(function(f) { return encodeURIComponent(f) + ':wght@400;600;700'; }).join('&') + '&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
    })
    .catch(function() {})
    .finally(function() { document.documentElement.style.visibility = 'visible'; });
  window.__applyOverlayConfig = function(config) {
    var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
    var root = document.documentElement;
    Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
    ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
      if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
    });
  };
})();
</script>
<script>
const DURATION = { minor: 3000, major: 5000, epic: 8000 };

const ICONS = {
  minor: `
    <rect x="6" y="1" width="4" height="1" fill="#00d4ff"/>
    <rect x="5" y="2" width="6" height="1" fill="#00d4ff"/>
    <rect x="4" y="3" width="8" height="1" fill="#00b8dd"/>
    <rect x="4" y="4" width="8" height="3" fill="#0099bb"/>
    <rect x="5" y="7" width="6" height="1" fill="#007799"/>
    <rect x="6" y="8" width="4" height="1" fill="#007799"/>
    <rect x="7" y="9" width="2" height="1" fill="#005566"/>
    <rect x="6" y="10" width="4" height="2" fill="#007799"/>
    <rect x="5" y="12" width="6" height="1" fill="#0099bb"/>
    <rect x="7" y="4" width="2" height="2" fill="#66eeff"/>
  `,
  major: `
    <rect x="6" y="0" width="4" height="1" fill="#ff2d7b"/>
    <rect x="5" y="1" width="6" height="1" fill="#ff2d7b"/>
    <rect x="4" y="2" width="8" height="1" fill="#dd2266"/>
    <rect x="3" y="3" width="10" height="1" fill="#dd2266"/>
    <rect x="3" y="4" width="10" height="3" fill="#bb1155"/>
    <rect x="4" y="7" width="8" height="1" fill="#991144"/>
    <rect x="5" y="8" width="6" height="1" fill="#991144"/>
    <rect x="6" y="9" width="4" height="1" fill="#770033"/>
    <rect x="5" y="10" width="6" height="2" fill="#991144"/>
    <rect x="4" y="12" width="8" height="1" fill="#bb1155"/>
    <rect x="6" y="4" width="4" height="2" fill="#ff66aa"/>
    <rect x="7" y="3" width="2" height="1" fill="#ff88bb"/>
  `,
  epic: `
    <rect x="7" y="0" width="2" height="1" fill="#39ff14"/>
    <rect x="6" y="1" width="4" height="1" fill="#39ff14"/>
    <rect x="5" y="2" width="6" height="1" fill="#39ff14"/>
    <rect x="4" y="3" width="8" height="1" fill="#33dd11"/>
    <rect x="3" y="4" width="10" height="1" fill="#2abb0e"/>
    <rect x="2" y="5" width="12" height="2" fill="#22990c"/>
    <rect x="3" y="7" width="10" height="1" fill="#1a770a"/>
    <rect x="4" y="8" width="8" height="1" fill="#166608"/>
    <rect x="5" y="9" width="6" height="1" fill="#115506"/>
    <rect x="6" y="10" width="4" height="1" fill="#0d4404"/>
    <rect x="5" y="11" width="6" height="2" fill="#115506"/>
    <rect x="4" y="13" width="8" height="1" fill="#166608"/>
    <rect x="6" y="5" width="4" height="2" fill="#66ff44"/>
    <rect x="7" y="4" width="2" height="1" fill="#88ff66"/>
    <rect x="7" y="3" width="2" height="1" fill="#ccffcc"/>
    <rect x="1" y="5" width="1" height="2" fill="#39ff14"/>
    <rect x="14" y="5" width="1" height="2" fill="#39ff14"/>
    <rect x="0" y="6" width="1" height="1" fill="#22990c"/>
    <rect x="15" y="6" width="1" height="1" fill="#22990c"/>
  `,
};

const LABELS = {
  minor: 'ACHIEVEMENT',
  major: 'ACHIEVEMENT UNLOCKED',
  epic: '\u2605 LEGENDARY ACHIEVEMENT \u2605',
};

const SUBS = {
  minor: '',
  major: 'WELL DONE',
  epic: 'LEGENDARY',
};

let hideTimeout = null;

function buildSparkles() {
  let html = '';
  for (let i = 0; i < 12; i++) {
    const left = Math.random() * 100;
    const top = 60 + Math.random() * 40;
    const delay = Math.random() * 2;
    const dur = 1.5 + Math.random() * 1.5;
    html += `<div class="sparkle" style="left:${left}%;top:${top}%;animation-delay:${delay}s;animation-duration:${dur}s"></div>`;
  }
  document.getElementById('sparkles').innerHTML = html;
}

function show(data) {
  const el = document.getElementById('achievement');
  const level = data.level || 'minor';

  // Reset
  el.className = 'achievement ' + level;

  // Icon
  document.getElementById('icon').innerHTML = ICONS[level] || ICONS.minor;

  // Text
  document.getElementById('label').textContent = LABELS[level] || 'ACHIEVEMENT';
  document.getElementById('title').textContent = data.title || data.message || 'Milestone!';
  document.getElementById('sub').textContent = SUBS[level] || '';

  // Sparkles for epic
  if (level === 'epic') buildSparkles();

  // Show
  requestAnimationFrame(() => {
    el.classList.add('visible');
  });

  // Hide after duration
  if (hideTimeout) clearTimeout(hideTimeout);
  hideTimeout = setTimeout(() => {
    el.classList.remove('visible');
    el.classList.add('hiding');
    setTimeout(() => {
      el.className = 'achievement';
    }, 700);
  }, DURATION[level] || 3000);
}

// WebSocket
function connectWS() {
  const ws = new WebSocket(`${window.__overlayWs}?overlay=1`);

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.event === 'milestone-trigger') show(msg.data);
      if (msg.event === 'overlay-config' && window.__applyOverlayConfig) window.__applyOverlayConfig(msg.data);
    } catch {}
  };

  ws.onclose = () => setTimeout(connectWS, 2000);
  ws.onerror = () => ws.close();
}

connectWS();
</script>
</body>
</html>
