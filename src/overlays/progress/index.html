<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>NFS Progress - OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary: #ff2d7b;
    --color-secondary: #00d4ff;
    --color-accent: #39ff14;
    --color-text: #ffffff;
    --color-bg: #0a0a0a;
    --color-bg-opacity: 0.92;
    --color-bg-secondary: #0d0d0d;
    --color-primary-rgb: 255 45 123;
    --color-secondary-rgb: 0 212 255;
    --color-accent-rgb: 57 255 20;
    --color-bg-rgb: 10 10 10;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-size-base: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent !important;
    background-color: rgba(0,0,0,0) !important;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding-top: 20px;
    font-family: var(--font-body);
    overflow: hidden;
    zoom: 1.5;
  }

  .container {
    width: 100%;
    max-width: 560px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 4px;
  }

  .header-bar {
    background: rgb(var(--color-bg-rgb) / 0.95);
    border: 3px solid var(--color-secondary);
    padding: 10px 24px;
    position: relative;
    overflow: hidden;
    transform: skewX(-3deg);
    box-shadow: 0 0 15px rgb(var(--color-secondary-rgb) / 0.5), inset 0 0 30px rgb(var(--color-secondary-rgb) / 0.05);
    animation: borderPulseBlue 2s ease-in-out infinite;
  }

  .header-bar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 8px,
      rgb(var(--color-secondary-rgb) / 0.06) 8px,
      rgb(var(--color-secondary-rgb) / 0.06) 16px
    );
    pointer-events: none;
  }

  .header h1 {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--color-secondary);
    letter-spacing: 8px;
    text-shadow: 0 0 10px rgb(var(--color-secondary-rgb) / 0.8), 0 0 30px rgb(var(--color-secondary-rgb) / 0.3), 3px 3px 0 rgba(0,0,0,0.8);
    margin: 0;
    text-transform: uppercase;
    transform: skewX(3deg);
  }

  .header-sub {
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--color-primary);
    letter-spacing: 6px;
    margin-top: 6px;
    text-shadow: 0 0 8px rgb(var(--color-primary-rgb) / 0.5);
    transform: skewX(3deg);
  }

  /* Project name */
  .project-name {
    font-family: var(--font-display);
    font-size: 22px;
    color: #ff6b35;
    letter-spacing: 4px;
    text-align: center;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255,107,53,0.5), 2px 2px 0 rgba(0,0,0,0.6);
    transform: skewX(-3deg);
    padding: 4px 0;
  }

  /* NFS styled box */
  .nfs-box {
    background: rgb(var(--color-bg-rgb) / 0.9);
    border: 3px solid var(--color-secondary);
    box-shadow: 0 0 10px rgb(var(--color-secondary-rgb) / 0.3);
    position: relative;
  }

  .nfs-box::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 40px; height: 3px;
    background: var(--color-primary);
    box-shadow: 0 0 8px rgb(var(--color-primary-rgb) / 0.5);
  }

  /* Progress bar */
  .progress-box { padding: 10px 14px; }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-family: var(--font-display);
    font-size: 14px;
    color: var(--color-secondary);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 6px rgb(var(--color-secondary-rgb) / 0.4);
  }

  .progress-count {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--color-accent);
    text-shadow: 0 0 6px rgb(var(--color-accent-rgb) / 0.5);
  }

  .bar-outer {
    height: 14px;
    background: rgba(20,20,20,0.9);
    border: 1px solid #333;
    position: relative;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--color-secondary), #0099cc, var(--color-secondary));
    background-size: 200% 100%;
    animation: barGlow 2s ease-in-out infinite;
    transition: width 0.5s ease;
    box-shadow: 0 0 10px rgb(var(--color-secondary-rgb) / 0.6);
  }

  @keyframes barGlow {
    0%, 100% { background-position: 0% 0%; }
    50% { background-position: 100% 0%; }
  }

  .bar-tick {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(255,255,255,0.05);
  }

  .bar-pct {
    text-align: right;
    font-family: var(--font-display);
    font-size: 14px;
    color: var(--color-secondary);
    margin-top: 4px;
    text-shadow: 0 0 6px rgb(var(--color-secondary-rgb) / 0.4);
  }

  /* Item list */
  .item-list {
    padding: 8px;
    max-height: 400px;
    overflow-y: auto;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border-bottom: 1px solid rgb(var(--color-secondary-rgb) / 0.1);
    animation: slideIn 0.3s ease-out forwards;
    opacity: 0;
    transform: translateX(-20px);
  }

  .item:last-child { border-bottom: none; }

  .checkbox {
    width: 22px;
    height: 22px;
    min-width: 22px;
    background: rgb(var(--color-bg-rgb) / 0.9);
    border: 2px solid #555;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    transform: skewX(-3deg);
  }

  .checkbox.done {
    background: rgb(var(--color-accent-rgb) / 0.15);
    border-color: var(--color-accent);
    box-shadow: 0 0 8px rgb(var(--color-accent-rgb) / 0.4);
  }

  .checkbox.in-progress {
    background: rgba(255,107,53,0.15);
    border-color: #ff6b35;
    box-shadow: 0 0 8px rgba(255,107,53,0.4);
    animation: progressPulse 1.5s ease-in-out infinite;
  }

  @keyframes progressPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(255,107,53,0.4); }
    50% { box-shadow: 0 0 15px rgba(255,107,53,0.7); }
  }

  .item-text {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: #ccc;
    line-height: 1.5;
    word-break: break-word;
  }

  .item-text.done {
    color: #444;
    text-decoration: line-through;
    text-decoration-color: var(--color-accent);
  }

  .item-text.in-progress {
    color: #ff6b35;
    text-shadow: 0 0 4px rgba(255,107,53,0.3);
  }

  .item-time {
    font-family: var(--font-body);
    font-size: 11px;
    color: #888;
    margin-left: auto;
    padding-right: 4px;
  }
  .item-time.active {
    color: var(--color-primary);
  }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    padding: 0 4px;
  }

  .footer-text {
    font-family: var(--font-display);
    font-size: 12px;
    color: #555;
    letter-spacing: 3px;
  }

  .footer-accent {
    color: #333;
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .empty-msg {
    text-align: center;
    padding: 24px 0;
    color: #444;
    font-family: var(--font-display);
    font-size: 16px;
    letter-spacing: 4px;
    text-shadow: 0 0 6px rgb(var(--color-secondary-rgb) / 0.3);
  }

  @keyframes slideIn {
    0% { opacity: 0; transform: translateX(-20px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  @keyframes borderPulseBlue {
    0%, 100% { box-shadow: 0 0 15px rgb(var(--color-secondary-rgb) / 0.5), inset 0 0 30px rgb(var(--color-secondary-rgb) / 0.05); }
    50% { box-shadow: 0 0 25px rgb(var(--color-secondary-rgb) / 0.7), inset 0 0 30px rgb(var(--color-secondary-rgb) / 0.1); }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: rgb(var(--color-bg-rgb) / 0.5); }
  ::-webkit-scrollbar-thumb { background: var(--color-secondary); border: 1px solid #333; }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-bar">
      <h1>PROGRESS</h1>
      <div class="header-sub">FEATURE TRACKER</div>
    </div>
  </div>

  <!-- Project Name -->
  <div class="project-name" id="projectName">&mdash;</div>

  <!-- Progress Bar -->
  <div class="nfs-box progress-box">
    <div class="progress-top">
      <span class="progress-label">FORTSCHRITT</span>
      <span class="progress-count" id="progressCount">0/0</span>
    </div>
    <div class="bar-outer">
      <div class="bar-fill" id="barFill" style="width:0%"></div>
      <div class="bar-tick" style="left:10%"></div>
      <div class="bar-tick" style="left:20%"></div>
      <div class="bar-tick" style="left:30%"></div>
      <div class="bar-tick" style="left:40%"></div>
      <div class="bar-tick" style="left:50%"></div>
      <div class="bar-tick" style="left:60%"></div>
      <div class="bar-tick" style="left:70%"></div>
      <div class="bar-tick" style="left:80%"></div>
      <div class="bar-tick" style="left:90%"></div>
    </div>
    <div class="bar-pct" id="barPct">0%</div>
  </div>

  <!-- Item List -->
  <div class="nfs-box item-list" id="itemList">
    <div class="empty-msg">LADE FEATURES...</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text" id="openCount">0 OFFEN</span>
    <span class="footer-accent">// NFS PROGRESS v1 //</span>
  </div>
</div>

<script>
(function() {
  var name = 'progress';
  var origin = window.location.origin || 'http://localhost:4000';
  window.__overlayOrigin = origin;
  window.__overlayWs = origin.replace(/^http/, 'ws');
  document.documentElement.style.visibility = 'hidden';
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return r + ' ' + g + ' ' + b;
  }
  fetch(origin + '/public/overlay-config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
      var root = document.documentElement;
      Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
      ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
        if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
      });
      var fonts = [vars['--font-display'], vars['--font-body']].filter(Boolean);
      if (fonts.length > 0) {
        var families = fonts.map(function(f) { return f.split(',')[0].replace(/'/g, '').trim(); });
        var link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=' + families.map(function(f) { return encodeURIComponent(f) + ':wght@400;600;700'; }).join('&') + '&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
    })
    .catch(function() {})
    .finally(function() { document.documentElement.style.visibility = 'visible'; });
  window.__applyOverlayConfig = function(config) {
    var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
    var root = document.documentElement;
    Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
    ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
      if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
    });
  };
})();
</script>
<script>
let items = [];
let projectName = '\u2014';
let liveTimerSeconds = 0;

async function fetchProgress() {
  try {
    const res = await fetch(`${window.__overlayOrigin}/public/progress`);
    const data = await res.json();
    projectName = data.project_name || '\u2014';
    items = data.items || [];
    render();
  } catch (err) {
    console.error('[Progress] Fetch failed:', err);
  }
}

function render() {
  const total = items.length;
  const doneCount = items.filter(i => i.status === 'done').length;
  const inProgressCount = items.filter(i => i.status === 'in_progress').length;
  const openCount = total - doneCount;
  const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;

  document.getElementById('projectName').textContent = projectName;
  document.getElementById('progressCount').textContent = doneCount + '/' + total;
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('barPct').textContent = pct + '%';
  document.getElementById('openCount').textContent = openCount + ' OFFEN';

  const list = document.getElementById('itemList');

  if (total === 0) {
    list.innerHTML = '<div class="empty-msg">KEINE FEATURES VORHANDEN</div>';
    return;
  }

  // Sort: in_progress first, then pending, then done
  const sorted = [...items].sort((a, b) => {
    const order = { in_progress: 0, pending: 1, done: 2 };
    const ao = order[a.status] ?? 1;
    const bo = order[b.status] ?? 1;
    if (ao !== bo) return ao - bo;
    return (a.sort_order || 0) - (b.sort_order || 0);
  });

  let html = '';
  sorted.forEach((item, i) => {
    const isDone = item.status === 'done';
    const isInProgress = item.status === 'in_progress';

    let checkClass = 'checkbox';
    if (isDone) checkClass += ' done';
    else if (isInProgress) checkClass += ' in-progress';

    let textClass = 'item-text';
    if (isDone) textClass += ' done';
    else if (isInProgress) textClass += ' in-progress';

    let checkmark = '';
    if (isDone) {
      checkmark = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#39ff14" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    } else if (isInProgress) {
      checkmark = '<span style="font-size:10px;color:#ff6b35;font-weight:bold">\u25B6</span>';
    }

    var timeSpent = item.time_spent || 0;
    if (isInProgress) timeSpent += liveTimerSeconds;
    var timeStr = timeSpent > 0 ? formatTime(timeSpent) : '';

    html += '<div class="item" style="animation-delay:' + (i * 0.06) + 's">'
      + '<div class="' + checkClass + '">' + checkmark + '</div>'
      + '<span class="' + textClass + '">' + escapeHtml(item.title) + '</span>'
      + (timeStr ? '<span class="item-time' + (isInProgress ? ' active' : '') + '">' + timeStr + '</span>' : '')
      + '</div>';
  });

  list.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatTime(seconds) {
  if (seconds < 60) return '< 1m';
  var h = Math.floor(seconds / 3600);
  var m = Math.floor((seconds % 3600) / 60);
  return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
}

let wsConnected = false;
let fallbackInterval = null;

function startFallbackPolling() {
  if (fallbackInterval) return;
  fallbackInterval = setInterval(fetchProgress, 10000);
}

function stopFallbackPolling() {
  if (fallbackInterval) {
    clearInterval(fallbackInterval);
    fallbackInterval = null;
  }
}

function connectWS() {
  const ws = new WebSocket(`${window.__overlayWs}?overlay=1`);

  ws.onopen = () => {
    console.log('[Progress] WebSocket connected');
    wsConnected = true;
    stopFallbackPolling();
    fetchProgress();
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.event && msg.event.startsWith('progress-')) fetchProgress();
      if (msg.event === 'stream-state' && msg.data) {
        liveTimerSeconds = msg.data.timer_seconds || 0;
        render();
      }
      if (msg.event === 'overlay-config' && window.__applyOverlayConfig) window.__applyOverlayConfig(msg.data);
    } catch {}
  };

  ws.onclose = () => {
    console.log('[Progress] WebSocket closed, reconnecting...');
    wsConnected = false;
    startFallbackPolling();
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => ws.close();
}

connectWS();
startFallbackPolling();
</script>
</body>
</html>
