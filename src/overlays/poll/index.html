<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #ffffff;
      --color-secondary: #cccccc;
      --color-accent: #ffffff;
      --color-bg: #0a0a0a;
      --font-display: 'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; font-family: var(--font-body); overflow: hidden; }

    .poll {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 20px;
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      width: 340px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .poll.visible { display: flex; }

    .poll-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
    }

    #options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .poll-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(20, 20, 20, 0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .poll-option:hover {
      border-color: rgba(255,255,255,0.16);
    }

    .poll-label {
      font-family: var(--font-body);
      font-size: 14px;
      color: #ffffff;
      flex: 1;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .poll-count {
      font-family: var(--font-display);
      font-size: 20px;
      color: rgba(255,255,255,0.7);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .poll-bar-wrap {
      width: 100%;
      height: 4px;
      background: rgba(30, 30, 30, 0.8);
      border-radius: 6px;
      overflow: hidden;
    }

    .poll-bar {
      height: 4px;
      background: rgba(255,255,255,0.3);
      transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .poll-option.winner {
      border-color: rgba(255,255,255,0.16);
    }

    .poll-option.winner .poll-label {
      color: #ffffff;
    }

    .poll-option.winner .poll-count {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="poll" id="poll">
    <div class="poll-title" id="poll-title"></div>
    <div id="options"></div>
  </div>

  <script>
(function() {
  var name = 'poll';
  var origin = window.location.origin || 'http://localhost:4000';
  window.__overlayOrigin = origin;
  window.__overlayWs = origin.replace(/^http/, 'ws');
  document.documentElement.style.visibility = 'hidden';
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return r + ' ' + g + ' ' + b;
  }
  fetch(origin + '/public/overlay-config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
      var root = document.documentElement;
      Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
      ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
        if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
      });
      var fonts = [vars['--font-display'], vars['--font-body']].filter(Boolean);
      if (fonts.length > 0) {
        var families = fonts.map(function(f) { return f.split(',')[0].replace(/'/g, '').trim(); });
        var link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=' + families.map(function(f) { return encodeURIComponent(f) + ':wght@400;600;700'; }).join('&') + '&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
    })
    .catch(function() {})
    .finally(function() { document.documentElement.style.visibility = 'visible'; });
  window.__applyOverlayConfig = function(config) {
    var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
    var root = document.documentElement;
    Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
    ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
      if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
    });
  };
})();
</script>
  <script>
    const ws = new WebSocket(`${window.__overlayWs}?overlay=1`);
    const poll = document.getElementById('poll');
    const pollTitle = document.getElementById('poll-title');
    const optionsEl = document.getElementById('options');

    ws.onmessage = (msg) => {
      const { event, data } = JSON.parse(msg.data);

      if (event === 'overlay-config' && window.__applyOverlayConfig) window.__applyOverlayConfig(data);

      if (event === 'poll-update') {
        poll.classList.add('visible');
        pollTitle.textContent = data.title;

        const total = data.options.reduce((sum, o) => sum + o.votes, 0) || 1;

        optionsEl.innerHTML = '';
        data.options.forEach(o => {
          const opt = document.createElement('div');
          opt.className = 'poll-option';
          const label = document.createElement('span');
          label.className = 'poll-label';
          label.textContent = o.label;
          const count = document.createElement('span');
          count.className = 'poll-count';
          count.textContent = String(o.votes);
          opt.appendChild(label);
          opt.appendChild(count);
          optionsEl.appendChild(opt);
          const barWrap = document.createElement('div');
          barWrap.className = 'poll-bar-wrap';
          const bar = document.createElement('div');
          bar.className = 'poll-bar';
          bar.style.width = ((o.votes / total) * 100) + '%';
          barWrap.appendChild(bar);
          optionsEl.appendChild(barWrap);
        });
      }

      if (event === 'poll-close') {
        // Highlight the winner
        const options = optionsEl.querySelectorAll('.poll-option');
        let maxVotes = -1;
        let winnerEl = null;
        options.forEach(opt => {
          const count = parseInt(opt.querySelector('.poll-count').textContent) || 0;
          if (count > maxVotes) {
            maxVotes = count;
            winnerEl = opt;
          }
        });
        if (winnerEl) winnerEl.classList.add('winner');

        setTimeout(() => poll.classList.remove('visible'), 5000);
      }
    };
  </script>
</body>
</html>
