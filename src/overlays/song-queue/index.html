<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #ffffff;
      --color-secondary: #cccccc;
      --color-accent: #ffffff;
      --color-bg: #0a0a0a;
      --font-display: 'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent !important; background-color: rgba(0,0,0,0) !important; font-family: var(--font-body); overflow: hidden; }

    #container { display: flex; flex-direction: column; gap: 6px; padding: 8px; }

    /* ---- Now Playing (from song overlay) ---- */
    .song {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .song.visible { display: flex; animation: songSlideIn 0.5s ease-out; }

    .song-artwork {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      display: none;
    }
    .song-artwork.visible { display: block; }

    @keyframes songSlideIn {
      0% { opacity: 0; transform: translateX(-40px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    .now-playing {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      display: inline-block;
      padding: 2px 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      margin-bottom: 2px;
    }

    .equalizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 24px;
      flex-shrink: 0;
    }

    .eq-bar {
      width: 4px;
      background: rgba(255,255,255,0.5);
      animation: eqBounce 0.8s ease-in-out infinite alternate;
    }

    .eq-bar:nth-child(1) { height: 60%; animation-delay: 0s; }
    .eq-bar:nth-child(2) { height: 100%; animation-delay: 0.15s; }
    .eq-bar:nth-child(3) { height: 40%; animation-delay: 0.3s; }
    .eq-bar:nth-child(4) { height: 80%; animation-delay: 0.45s; }
    .eq-bar:nth-child(5) { height: 50%; animation-delay: 0.1s; }

    @keyframes eqBounce {
      0% { transform: scaleY(0.3); }
      100% { transform: scaleY(1); }
    }

    .song-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .song-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-artist {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    .song-requester {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
    }

    /* ---- Queue (upcoming songs) ---- */
    .sr-next {
      display: none;
      flex-direction: column;
      gap: 2px;
      padding: 6px 12px;
      background: rgba(10, 10, 10, 0.75);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
    }
    .sr-next.visible { display: flex; }

    .sr-next-label {
      font-family: var(--font-display);
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .sr-next-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      animation: srFadeIn 0.3s ease-out;
    }
    .sr-next-pos { min-width: 16px; color: rgba(255,255,255,0.3); }
    .sr-next-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sr-next-user { color: rgba(255,255,255,0.4); font-size: 11px; }

    @keyframes srFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="container">
    <!-- Now Playing — shows current song (manual/auto-detect OR song request) -->
    <div class="song" id="song">
      <img class="song-artwork" id="song-artwork" alt="" />
      <div class="equalizer">
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>
      <div class="song-info">
        <div class="now-playing">NOW PLAYING</div>
        <span class="song-title" id="song-title"></span>
        <span class="song-artist" id="song-artist"></span>
        <span class="song-requester" id="song-requester"></span>
      </div>
    </div>

    <!-- Queue — upcoming song requests -->
    <div class="sr-next" id="next">
      <span class="sr-next-label">UP NEXT</span>
    </div>
  </div>

  <script>
(function() {
  var name = 'song-queue';
  var origin = window.location.origin || 'http://localhost:4000';
  window.__overlayOrigin = origin;
  window.__overlayWs = origin.replace(/^http/, 'ws');
  document.documentElement.style.visibility = 'hidden';
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return r + ' ' + g + ' ' + b;
  }
  fetch(origin + '/public/overlay-config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
      var root = document.documentElement;
      Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
      ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
        if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
      });
      var fonts = [vars['--font-display'], vars['--font-body']].filter(Boolean);
      if (fonts.length > 0) {
        var families = fonts.map(function(f) { return f.split(',')[0].replace(/'/g, '').trim(); });
        var link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=' + families.map(function(f) { return encodeURIComponent(f) + ':wght@400;600;700'; }).join('&') + '&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
    })
    .catch(function() {})
    .finally(function() { document.documentElement.style.visibility = 'visible'; });
  window.__applyOverlayConfig = function(config) {
    var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
    var root = document.documentElement;
    Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
    ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
      if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
    });
  };
})();
  </script>
  <script>
    const songEl = document.getElementById('song');
    const songTitle = document.getElementById('song-title');
    const songArtist = document.getElementById('song-artist');
    const songRequester = document.getElementById('song-requester');
    const songArtwork = document.getElementById('song-artwork');
    const nextEl = document.getElementById('next');

    // --- Now Playing state (can come from song-update OR sr playing) ---
    function showSong(title, artist, requester, artworkUrl) {
      songTitle.textContent = title || 'Unknown';
      songArtist.textContent = artist || '';
      songRequester.textContent = requester || '';
      if (artworkUrl) {
        songArtwork.src = artworkUrl;
        songArtwork.classList.add('visible');
      } else {
        songArtwork.classList.remove('visible');
      }
      songEl.classList.remove('visible');
      void songEl.offsetWidth;
      songEl.classList.add('visible');
    }

    function hideSong() {
      songEl.classList.remove('visible');
      songArtwork.classList.remove('visible');
    }

    // --- Queue rendering ---
    function renderQueue(queue) {
      const playing = queue.find(s => s.status === 'playing');
      const pending = queue.filter(s => s.status === 'pending').slice(0, 3);

      // Show playing song request in the Now Playing section
      if (playing) {
        showSong(playing.title, playing.artist, '@' + playing.requested_by, null);
      }

      // Render upcoming queue
      // Keep the label element, clear only the items
      const label = nextEl.querySelector('.sr-next-label');
      nextEl.innerHTML = '';
      nextEl.appendChild(label);

      if (pending.length > 0) {
        nextEl.classList.add('visible');
        pending.forEach((s, i) => {
          const item = document.createElement('div');
          item.className = 'sr-next-item';
          item.innerHTML =
            '<span class="sr-next-pos">' + (i + 1) + '.</span>' +
            '<span class="sr-next-title">' + s.title + (s.artist ? ' — ' + s.artist : '') + '</span>' +
            '<span class="sr-next-user">@' + s.requested_by + '</span>';
          nextEl.appendChild(item);
        });
      } else {
        nextEl.classList.remove('visible');
      }
    }

    // --- Initial fetch for queue ---
    fetch(`${window.__overlayOrigin}/public/song-queue`)
      .then(r => r.json())
      .then(renderQueue)
      .catch(() => {});

    // --- WebSocket ---
    const ws = new WebSocket(`${window.__overlayWs}?overlay=1`);
    ws.onmessage = (msg) => {
      const { event, data } = JSON.parse(msg.data);

      if (event === 'overlay-config' && window.__applyOverlayConfig) window.__applyOverlayConfig(data);

      // Manual/auto-detect song update (from SongPanel or SMTC)
      if (event === 'song-update') {
        showSong(data.title, data.artist, '', data.artworkUrl || null);
      }

      if (event === 'song-clear') {
        hideSong();
      }

      // Song request queue update
      if (event === 'sr-update') {
        fetch(`${window.__overlayOrigin}/public/song-queue`)
          .then(r => r.json())
          .then(renderQueue)
          .catch(() => {});
      }
    };
  </script>
</body>
</html>
