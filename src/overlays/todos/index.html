<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>NFS Tasks - OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary: #ffffff;
    --color-secondary: #cccccc;
    --color-accent: #ffffff;
    --color-bg: #0a0a0a;
    --font-display: 'Rajdhani', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent !important;
    background-color: rgba(0,0,0,0) !important;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding-top: 20px;
    font-family: var(--font-body);
    overflow: hidden;
    max-width: 100vw;
    overflow-x: hidden;
  }

  .container {
    width: 100%;
    max-width: 100%;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 4px;
    position: relative;
  }

  .header-bar {
    background: rgba(10, 10, 10, 0.95);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 10px 24px;
    position: relative;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .header h1 {
    font-family: var(--font-display);
    font-size: 20px;
    color: #ffffff;
    letter-spacing: 8px;
    margin: 0;
    text-transform: uppercase;
  }

  .header-sub {
    font-family: var(--font-display);
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 6px;
    margin-top: 6px;
  }

  /* Card box */
  .nfs-box {
    background: rgba(10, 10, 10, 0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    position: relative;
  }

  .progress-box { padding: 10px 14px; }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-family: var(--font-display);
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .progress-count {
    font-family: var(--font-display);
    font-size: 18px;
    color: #ffffff;
  }

  .bar-outer {
    height: 14px;
    background: rgba(20,20,20,0.9);
    border: 1px solid #333;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: rgba(255,255,255,0.3);
    transition: width 0.5s ease;
  }

  @keyframes barSlide {
    0%, 100% { background-position: 0% 0%; }
    50% { background-position: 100% 0%; }
  }

  .bar-tick {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(255,255,255,0.05);
  }

  .bar-pct {
    text-align: right;
    font-family: var(--font-display);
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
  }

  /* Todo list */
  .todo-list {
    padding: 8px;
    max-height: 400px;
    overflow-y: auto;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    animation: slideIn 0.3s ease-out forwards;
    opacity: 0;
    transform: translateX(-20px);
  }

  .todo-item:last-child { border-bottom: none; }

  .checkbox {
    width: 22px;
    height: 22px;
    min-width: 22px;
    background: rgba(10, 10, 10, 0.9);
    border: 2px solid #555;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .checkbox.checked {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.5);
  }

  .todo-text {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: #ccc;
    line-height: 1.5;
    word-break: break-word;
  }

  .todo-text.done {
    color: #444;
    text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,0.3);
  }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    padding: 0 4px;
  }

  .footer-text {
    font-family: var(--font-display);
    font-size: 12px;
    color: #555;
    letter-spacing: 3px;
  }

  .footer-accent {
    color: #333;
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .empty-msg {
    text-align: center;
    padding: 24px 0;
    color: #444;
    font-family: var(--font-display);
    font-size: 16px;
    letter-spacing: 4px;
  }

  @keyframes slideIn {
    0% { opacity: 0; transform: translateX(-20px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: rgba(10, 10, 10, 0.5); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border: 1px solid #333; }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-bar">
      <h1>TASKS</h1>
      <div class="header-sub">MISSION BOARD</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="nfs-box progress-box">
    <div class="progress-top">
      <span class="progress-label">FORTSCHRITT</span>
      <span class="progress-count" id="progressCount">0/0</span>
    </div>
    <div class="bar-outer">
      <div class="bar-fill" id="barFill" style="width:0%"></div>
      <div class="bar-tick" style="left:10%"></div>
      <div class="bar-tick" style="left:20%"></div>
      <div class="bar-tick" style="left:30%"></div>
      <div class="bar-tick" style="left:40%"></div>
      <div class="bar-tick" style="left:50%"></div>
      <div class="bar-tick" style="left:60%"></div>
      <div class="bar-tick" style="left:70%"></div>
      <div class="bar-tick" style="left:80%"></div>
      <div class="bar-tick" style="left:90%"></div>
    </div>
    <div class="bar-pct" id="barPct">0%</div>
  </div>

  <!-- Todo List -->
  <div class="nfs-box todo-list" id="todoList">
    <div class="empty-msg">LADE TASKS...</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text" id="openCount">0 OFFEN</span>
    <span class="footer-accent">// NFS TASKS v1 //</span>
  </div>
</div>

<script>
(function() {
  var name = 'todos';
  var origin = window.location.origin || 'http://localhost:4000';
  window.__overlayOrigin = origin;
  window.__overlayWs = origin.replace(/^http/, 'ws');
  document.documentElement.style.visibility = 'hidden';
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return r + ' ' + g + ' ' + b;
  }
  fetch(origin + '/public/overlay-config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
      var root = document.documentElement;
      Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
      ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
        if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
      });
      var fonts = [vars['--font-display'], vars['--font-body']].filter(Boolean);
      if (fonts.length > 0) {
        var families = fonts.map(function(f) { return f.split(',')[0].replace(/'/g, '').trim(); });
        var link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=' + families.map(function(f) { return encodeURIComponent(f) + ':wght@400;600;700'; }).join('&') + '&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
    })
    .catch(function() {})
    .finally(function() { document.documentElement.style.visibility = 'visible'; });
  window.__applyOverlayConfig = function(config) {
    var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
    var root = document.documentElement;
    Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
    ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
      if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
    });
  };
})();
</script>
<script>
let todos = [];
let projectTitle = '';

async function fetchData() {
  try {
    const res = await fetch(`${window.__overlayOrigin}/public/progress`);
    const data = await res.json();
    const activeItem = (data.items || []).find(i => i.status === 'in_progress');

    if (!activeItem) {
      projectTitle = '';
      todos = [];
    } else {
      projectTitle = activeItem.title;
      todos = activeItem.todos || [];
    }
    render();
  } catch (err) {
    console.error('[Todos] Fetch failed:', err);
  }
}

function render() {
  const total = todos.length;
  const doneCount = todos.filter(t => t.done).length;
  const openCount = total - doneCount;
  const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;

  document.getElementById('progressCount').textContent = doneCount + '/' + total;
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('barPct').textContent = pct + '%';
  document.getElementById('openCount').textContent = openCount + ' OFFEN';

  const list = document.getElementById('todoList');

  // Update header to show active item title
  const headerEl = document.querySelector('.header h1');
  if (headerEl) {
    headerEl.textContent = projectTitle ? projectTitle.toUpperCase() : 'TASKS';
  }

  if (!projectTitle && total === 0) {
    list.innerHTML = '<div class="empty-msg">KEIN AKTIVES FEATURE</div>';
    return;
  }

  if (total === 0) {
    list.innerHTML = ''
      + '<div class="empty-msg" style="text-transform:none;font-size:14px;letter-spacing:1px;line-height:1.5;padding:18px 12px;">'
      + '<div style="font-family:var(--font-display);font-size:16px;letter-spacing:4px;color:rgba(255,255,255,0.5);margin-bottom:10px;">NOCH KEINE SUB-TASKS</div>'
      + 'Füge welche in der App hinzu —<br/>sie erscheinen hier live.'
      + '</div>';
    return;
  }

  // Sort: open first, then done
  const sorted = [...todos].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return (a.sort_order || 0) - (b.sort_order || 0);
  });

  let html = '';
  sorted.forEach((todo, i) => {
    const checkClass = todo.done ? 'checkbox checked' : 'checkbox';
    const textClass = todo.done ? 'todo-text done' : 'todo-text';
    const checkmark = todo.done
      ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
      : '';

    html += '<div class="todo-item" style="animation-delay:' + (i * 0.06) + 's">'
      + '<div class="' + checkClass + '">' + checkmark + '</div>'
      + '<span class="' + textClass + '">' + escapeHtml(todo.title) + '</span>'
      + '</div>';
  });

  list.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// WebSocket for live updates
const ws = new WebSocket(`${window.__overlayWs}?overlay=1`);

ws.onmessage = (e) => {
  try {
    const msg = JSON.parse(e.data);
    if (msg.event === 'progress-update') {
      fetchData();
    }
    if (msg.event === 'overlay-config' && window.__applyOverlayConfig) window.__applyOverlayConfig(msg.data);
  } catch {}
};

ws.onclose = () => setTimeout(() => location.reload(), 3000);

fetchData();
</script>
</body>
</html>
