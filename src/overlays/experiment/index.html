<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #ff2d7b;
      --color-secondary: #00d4ff;
      --color-accent: #39ff14;
      --color-text: #ffffff;
      --color-bg: #0a0a0a;
      --color-bg-opacity: 0.92;
      --color-bg-secondary: #0d0d0d;
      --color-primary-rgb: 255 45 123;
      --color-secondary-rgb: 0 212 255;
      --color-accent-rgb: 57 255 20;
      --color-bg-rgb: 10 10 10;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-size-base: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent !important; background-color: rgba(0,0,0,0) !important; font-family: var(--font-body); overflow: hidden; }

    .banner {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 12px 22px;
      background: rgb(var(--color-bg-rgb) / 0.95);
      border: 3px solid var(--color-primary);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 15px rgb(var(--color-primary-rgb) / 0.5);
      animation: bannerPulse 2s ease-in-out infinite;
    }

    .banner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgb(var(--color-primary-rgb) / 0.04) 10px,
        rgb(var(--color-primary-rgb) / 0.04) 20px
      );
      pointer-events: none;
    }

    .banner::after {
      content: 'CHALLENGE';
      position: absolute;
      top: 0; right: 0;
      background: var(--color-primary);
      color: #000;
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 3px;
      padding: 2px 10px;
      transform: skewX(-3deg);
      transform-origin: top right;
      box-shadow: 0 0 8px rgb(var(--color-primary-rgb) / 0.5);
    }

    .banner.visible { display: flex; }

    @keyframes bannerPulse {
      0%, 100% { box-shadow: 0 0 15px rgb(var(--color-primary-rgb) / 0.5); }
      50% { box-shadow: 0 0 25px rgb(var(--color-primary-rgb) / 0.7); }
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.in_progress {
      background: var(--color-primary);
      box-shadow: 0 0 10px rgb(var(--color-primary-rgb) / 0.8), 0 0 20px rgb(var(--color-primary-rgb) / 0.4);
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .status-dot.done {
      background: var(--color-accent);
      box-shadow: 0 0 10px rgb(var(--color-accent-rgb) / 0.6);
    }

    .status-dot.failed {
      background: var(--color-primary);
      box-shadow: 0 0 10px rgb(var(--color-primary-rgb) / 0.6);
    }

    .status-dot.idle {
      background: #555;
      box-shadow: 0 0 5px rgba(85,85,85,0.3);
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 10px rgb(var(--color-primary-rgb) / 0.8), 0 0 20px rgb(var(--color-primary-rgb) / 0.4); }
      50% { opacity: 0.5; box-shadow: 0 0 20px rgb(var(--color-primary-rgb) / 1), 0 0 40px rgb(var(--color-primary-rgb) / 0.6); }
    }

    .title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgb(var(--color-secondary-rgb) / 0.4), 3px 3px 0 rgba(0,0,0,0.6);
      text-transform: uppercase;
    }

    .timer {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: #ff6b35;
      margin-left: auto;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255,107,53,0.6), 0 0 20px rgba(255,107,53,0.3);
    }

    .timer.paused {
      opacity: 0.4;
    }

    .status-label {
      font-family: var(--font-display);
      font-size: 14px;
      text-transform: uppercase;
      color: var(--color-secondary);
      letter-spacing: 2px;
      text-shadow: 0 0 6px rgb(var(--color-secondary-rgb) / 0.4);
    }
  </style>
</head>
<body>
  <div class="banner" id="banner">
    <div class="status-dot" id="dot"></div>
    <span class="title" id="title"></span>
    <span class="status-label" id="status-label"></span>
    <span class="timer" id="timer"></span>
  </div>

  <script>
(function() {
  var name = 'experiment';
  var origin = window.location.origin || 'http://localhost:4000';
  window.__overlayOrigin = origin;
  window.__overlayWs = origin.replace(/^http/, 'ws');
  document.documentElement.style.visibility = 'hidden';
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return r + ' ' + g + ' ' + b;
  }
  fetch(origin + '/public/overlay-config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
      var root = document.documentElement;
      Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
      ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
        if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
      });
      var fonts = [vars['--font-display'], vars['--font-body']].filter(Boolean);
      if (fonts.length > 0) {
        var families = fonts.map(function(f) { return f.split(',')[0].replace(/'/g, '').trim(); });
        var link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=' + families.map(function(f) { return encodeURIComponent(f) + ':wght@400;600;700'; }).join('&') + '&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
    })
    .catch(function() {})
    .finally(function() { document.documentElement.style.visibility = 'visible'; });
  window.__applyOverlayConfig = function(config) {
    var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
    var root = document.documentElement;
    Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
    ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
      if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
    });
  };
})();
</script>
  <script>
    var banner = document.getElementById('banner');
    var dot = document.getElementById('dot');
    var titleEl = document.getElementById('title');
    var statusLabel = document.getElementById('status-label');
    var timerEl = document.getElementById('timer');

    var currentSeconds = 0;
    var timerRunning = false;
    var tickInterval = null;

    function formatTime(s) {
      var m = Math.floor(s / 60).toString().padStart(2, '0');
      var sec = (s % 60).toString().padStart(2, '0');
      return m + ':' + sec;
    }

    function startTicking() {
      stopTicking();
      if (!timerRunning) return;
      tickInterval = setInterval(function() {
        currentSeconds++;
        timerEl.textContent = formatTime(currentSeconds);
      }, 1000);
    }

    function stopTicking() {
      if (tickInterval) {
        clearInterval(tickInterval);
        tickInterval = null;
      }
    }

    var statusMap = {
      'in_progress': 'L\u00e4uft',
      'done': 'Geschafft!',
      'failed': 'Nicht geschafft',
      'idle': ''
    };

    function update(state) {
      if (!state.challenge_title || state.challenge_status === 'idle') {
        banner.classList.remove('visible');
        stopTicking();
        return;
      }

      banner.classList.add('visible');
      titleEl.textContent = state.challenge_title;
      statusLabel.textContent = statusMap[state.challenge_status] || state.challenge_status;
      dot.className = 'status-dot ' + state.challenge_status;

      currentSeconds = state.timer_seconds || 0;
      timerRunning = !!state.timer_running;

      if (currentSeconds > 0 || timerRunning) {
        timerEl.textContent = formatTime(currentSeconds);
        timerEl.style.display = '';
      } else {
        timerEl.style.display = 'none';
      }

      if (timerRunning) {
        timerEl.classList.remove('paused');
        startTicking();
      } else {
        timerEl.classList.add('paused');
        stopTicking();
      }
    }

    // WebSocket
    var ws;
    function connectWS() {
      ws = new WebSocket(`${window.__overlayWs}?overlay=1`);

      ws.onopen = function() {
        fetch(`${window.__overlayOrigin}/public/stream-state`)
          .then(function(r) { return r.json(); })
          .then(update);
      };

      ws.onmessage = function(msg) {
        try {
          var parsed = JSON.parse(msg.data);
          if (parsed.event === 'stream-state') update(parsed.data);
          if (parsed.event === 'overlay-config' && window.__applyOverlayConfig) window.__applyOverlayConfig(parsed.data);
        } catch(e) {}
      };

      ws.onclose = function() {
        stopTicking();
        setTimeout(connectWS, 2000);
      };

      ws.onerror = function() { ws.close(); };
    }

    connectWS();
  </script>
</body>
</html>
