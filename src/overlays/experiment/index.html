<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #ffffff;
      --color-secondary: #cccccc;
      --color-accent: #ffffff;
      --color-bg: #0a0a0a;
      --font-display: 'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
      --color-text: #ffffff;
      --color-primary-rgb: 255 255 255;
      --color-secondary-rgb: 204 204 204;
      --color-accent-rgb: 255 255 255;
      --color-bg-rgb: 10 10 10;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent !important; background-color: rgba(0,0,0,0) !important; font-family: var(--font-body); overflow: hidden; max-width: 100vw; overflow-x: hidden; }

    .banner {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 12px 22px;
      background: rgba(10,10,10,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .banner.visible { display: flex; }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.in_progress {
      background: var(--color-primary);
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .status-dot.done {
      background: var(--color-accent);
    }

    .status-dot.failed {
      background: var(--color-primary);
    }

    .status-dot.idle {
      background: #555;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .timer {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      margin-left: auto;
      letter-spacing: 3px;
    }

    .timer.paused {
      opacity: 0.4;
    }

    .status-label {
      font-family: var(--font-display);
      font-size: 14px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="banner" id="banner">
    <div class="status-dot" id="dot"></div>
    <span class="title" id="title"></span>
    <span class="status-label" id="status-label"></span>
    <span class="timer" id="timer"></span>
  </div>

  <script>
(function() {
  var name = 'experiment';
  var origin = window.location.origin || 'http://localhost:4000';
  window.__overlayOrigin = origin;
  window.__overlayWs = origin.replace(/^http/, 'ws');
  document.documentElement.style.visibility = 'hidden';
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return r + ' ' + g + ' ' + b;
  }
  fetch(origin + '/public/overlay-config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
      var root = document.documentElement;
      Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
      ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
        if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
      });
      var fonts = [vars['--font-display'], vars['--font-body']].filter(Boolean);
      if (fonts.length > 0) {
        var families = fonts.map(function(f) { return f.split(',')[0].replace(/'/g, '').trim(); });
        var link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=' + families.map(function(f) { return encodeURIComponent(f) + ':wght@400;600;700'; }).join('&') + '&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
    })
    .catch(function() {})
    .finally(function() { document.documentElement.style.visibility = 'visible'; });
  window.__applyOverlayConfig = function(config) {
    var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
    var root = document.documentElement;
    Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
    ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
      if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
    });
  };
})();
</script>
  <script>
    var banner = document.getElementById('banner');
    var dot = document.getElementById('dot');
    var titleEl = document.getElementById('title');
    var statusLabel = document.getElementById('status-label');
    var timerEl = document.getElementById('timer');

    var currentSeconds = 0;
    var timerRunning = false;
    var tickInterval = null;

    function formatTime(s) {
      var m = Math.floor(s / 60).toString().padStart(2, '0');
      var sec = (s % 60).toString().padStart(2, '0');
      return m + ':' + sec;
    }

    function startTicking() {
      stopTicking();
      if (!timerRunning) return;
      tickInterval = setInterval(function() {
        currentSeconds++;
        timerEl.textContent = formatTime(currentSeconds);
      }, 1000);
    }

    function stopTicking() {
      if (tickInterval) {
        clearInterval(tickInterval);
        tickInterval = null;
      }
    }

    var statusMap = {
      'in_progress': 'L\u00e4uft',
      'done': 'Geschafft!',
      'failed': 'Nicht geschafft',
      'idle': ''
    };

    function update(state) {
      if (!state.challenge_title || state.challenge_status === 'idle') {
        banner.classList.remove('visible');
        stopTicking();
        return;
      }

      banner.classList.add('visible');
      titleEl.textContent = state.challenge_title;
      statusLabel.textContent = statusMap[state.challenge_status] || state.challenge_status;
      dot.className = 'status-dot ' + state.challenge_status;

      currentSeconds = state.timer_seconds || 0;
      timerRunning = !!state.timer_running;

      if (currentSeconds > 0 || timerRunning) {
        timerEl.textContent = formatTime(currentSeconds);
        timerEl.style.display = '';
      } else {
        timerEl.style.display = 'none';
      }

      if (timerRunning) {
        timerEl.classList.remove('paused');
        startTicking();
      } else {
        timerEl.classList.add('paused');
        stopTicking();
      }
    }

    // WebSocket
    var ws;
    function connectWS() {
      ws = new WebSocket(`${window.__overlayWs}?overlay=1`);

      ws.onopen = function() {
        fetch(`${window.__overlayOrigin}/public/stream-state`)
          .then(function(r) { return r.json(); })
          .then(update);
      };

      ws.onmessage = function(msg) {
        try {
          var parsed = JSON.parse(msg.data);
          if (parsed.event === 'stream-state') update(parsed.data);
          if (parsed.event === 'overlay-config' && window.__applyOverlayConfig) window.__applyOverlayConfig(parsed.data);
        } catch(e) {}
      };

      ws.onclose = function() {
        stopTicking();
        setTimeout(connectWS, 2000);
      };

      ws.onerror = function() { ws.close(); };
    }

    connectWS();
  </script>
</body>
</html>
