<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent !important; background-color: rgba(0,0,0,0) !important; font-family: 'SF Mono', monospace; overflow: hidden; }

    .banner {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: rgba(13, 13, 13, 0.85);
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      backdrop-filter: blur(8px);
    }

    .banner.visible { display: flex; }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.in_progress { background: #e74c3c; animation: pulse 1.5s infinite; }
    .status-dot.done { background: #2ecc71; }
    .status-dot.failed { background: #e74c3c; }
    .status-dot.idle { background: #888; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      color: #e0e0e0;
    }

    .timer {
      font-size: 20px;
      font-weight: 700;
      color: #e67e22;
      margin-left: auto;
    }

    .timer.paused {
      opacity: 0.5;
    }

    .status-label {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="banner" id="banner">
    <div class="status-dot" id="dot"></div>
    <span class="title" id="title"></span>
    <span class="status-label" id="status-label"></span>
    <span class="timer" id="timer"></span>
  </div>

  <script>
    var banner = document.getElementById('banner');
    var dot = document.getElementById('dot');
    var titleEl = document.getElementById('title');
    var statusLabel = document.getElementById('status-label');
    var timerEl = document.getElementById('timer');

    var currentSeconds = 0;
    var timerRunning = false;
    var tickInterval = null;

    function formatTime(s) {
      var m = Math.floor(s / 60).toString().padStart(2, '0');
      var sec = (s % 60).toString().padStart(2, '0');
      return m + ':' + sec;
    }

    function startTicking() {
      stopTicking();
      if (!timerRunning) return;
      tickInterval = setInterval(function() {
        currentSeconds++;
        timerEl.textContent = formatTime(currentSeconds);
      }, 1000);
    }

    function stopTicking() {
      if (tickInterval) {
        clearInterval(tickInterval);
        tickInterval = null;
      }
    }

    var statusMap = {
      'in_progress': 'Läuft',
      'done': 'Geschafft!',
      'failed': 'Nicht geschafft',
      'idle': ''
    };

    function update(state) {
      if (!state.experiment_title || state.experiment_status === 'idle') {
        banner.classList.remove('visible');
        stopTicking();
        return;
      }

      banner.classList.add('visible');
      titleEl.textContent = state.experiment_title;
      statusLabel.textContent = statusMap[state.experiment_status] || state.experiment_status;
      dot.className = 'status-dot ' + state.experiment_status;

      currentSeconds = state.timer_seconds || 0;
      timerRunning = !!state.timer_running;

      if (currentSeconds > 0 || timerRunning) {
        timerEl.textContent = formatTime(currentSeconds);
        timerEl.style.display = '';
      } else {
        timerEl.style.display = 'none';
      }

      if (timerRunning) {
        timerEl.classList.remove('paused');
        startTicking();
      } else {
        timerEl.classList.add('paused');
        stopTicking();
      }
    }

    // WebSocket
    var ws;
    function connectWS() {
      ws = new WebSocket('ws://localhost:4000?overlay=1');

      ws.onopen = function() {
        fetch('http://localhost:4000/public/stream-state')
          .then(function(r) { return r.json(); })
          .then(update);
      };

      ws.onmessage = function(msg) {
        try {
          var parsed = JSON.parse(msg.data);
          if (parsed.event === 'stream-state') update(parsed.data);
        } catch(e) {}
      };

      ws.onclose = function() {
        stopTicking();
        setTimeout(connectWS, 2000);
      };

      ws.onerror = function() { ws.close(); };
    }

    connectWS();
  </script>
</body>
</html>
