<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent !important; background-color: rgba(0,0,0,0) !important; font-family: 'Inter', sans-serif; overflow: hidden; }

    .banner {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 12px 22px;
      background: rgba(10,10,10,0.95);
      border: 3px solid #ff2d7b;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(255,45,123,0.5);
      animation: bannerPulse 2s ease-in-out infinite;
    }

    .banner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(255,45,123,0.04) 10px,
        rgba(255,45,123,0.04) 20px
      );
      pointer-events: none;
    }

    .banner::after {
      content: 'CHALLENGE';
      position: absolute;
      top: 0; right: 0;
      background: #ff2d7b;
      color: #000;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      padding: 2px 10px;
      transform: skewX(-3deg);
      transform-origin: top right;
      box-shadow: 0 0 8px rgba(255,45,123,0.5);
    }

    .banner.visible { display: flex; }

    @keyframes bannerPulse {
      0%, 100% { box-shadow: 0 0 15px rgba(255,45,123,0.5); }
      50% { box-shadow: 0 0 25px rgba(255,45,123,0.7); }
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.in_progress {
      background: #ff2d7b;
      box-shadow: 0 0 10px rgba(255,45,123,0.8), 0 0 20px rgba(255,45,123,0.4);
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .status-dot.done {
      background: #39ff14;
      box-shadow: 0 0 10px rgba(57,255,20,0.6);
    }

    .status-dot.failed {
      background: #ff2d7b;
      box-shadow: 0 0 10px rgba(255,45,123,0.6);
    }

    .status-dot.idle {
      background: #555;
      box-shadow: 0 0 5px rgba(85,85,85,0.3);
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 10px rgba(255,45,123,0.8), 0 0 20px rgba(255,45,123,0.4); }
      50% { opacity: 0.5; box-shadow: 0 0 20px rgba(255,45,123,1), 0 0 40px rgba(255,45,123,0.6); }
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #e0e0e0;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(0,212,255,0.4), 3px 3px 0 rgba(0,0,0,0.6);
      text-transform: uppercase;
    }

    .timer {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #ff6b35;
      margin-left: auto;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255,107,53,0.6), 0 0 20px rgba(255,107,53,0.3);
    }

    .timer.paused {
      opacity: 0.4;
    }

    .status-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      text-transform: uppercase;
      color: #00d4ff;
      letter-spacing: 2px;
      text-shadow: 0 0 6px rgba(0,212,255,0.4);
    }
  </style>
</head>
<body>
  <div class="banner" id="banner">
    <div class="status-dot" id="dot"></div>
    <span class="title" id="title"></span>
    <span class="status-label" id="status-label"></span>
    <span class="timer" id="timer"></span>
  </div>

  <script>
    var banner = document.getElementById('banner');
    var dot = document.getElementById('dot');
    var titleEl = document.getElementById('title');
    var statusLabel = document.getElementById('status-label');
    var timerEl = document.getElementById('timer');

    var currentSeconds = 0;
    var timerRunning = false;
    var tickInterval = null;

    function formatTime(s) {
      var m = Math.floor(s / 60).toString().padStart(2, '0');
      var sec = (s % 60).toString().padStart(2, '0');
      return m + ':' + sec;
    }

    function startTicking() {
      stopTicking();
      if (!timerRunning) return;
      tickInterval = setInterval(function() {
        currentSeconds++;
        timerEl.textContent = formatTime(currentSeconds);
      }, 1000);
    }

    function stopTicking() {
      if (tickInterval) {
        clearInterval(tickInterval);
        tickInterval = null;
      }
    }

    var statusMap = {
      'in_progress': 'L\u00e4uft',
      'done': 'Geschafft!',
      'failed': 'Nicht geschafft',
      'idle': ''
    };

    function update(state) {
      if (!state.experiment_title || state.experiment_status === 'idle') {
        banner.classList.remove('visible');
        stopTicking();
        return;
      }

      banner.classList.add('visible');
      titleEl.textContent = state.experiment_title;
      statusLabel.textContent = statusMap[state.experiment_status] || state.experiment_status;
      dot.className = 'status-dot ' + state.experiment_status;

      currentSeconds = state.timer_seconds || 0;
      timerRunning = !!state.timer_running;

      if (currentSeconds > 0 || timerRunning) {
        timerEl.textContent = formatTime(currentSeconds);
        timerEl.style.display = '';
      } else {
        timerEl.style.display = 'none';
      }

      if (timerRunning) {
        timerEl.classList.remove('paused');
        startTicking();
      } else {
        timerEl.classList.add('paused');
        stopTicking();
      }
    }

    // WebSocket
    var ws;
    function connectWS() {
      ws = new WebSocket('ws://localhost:4000?overlay=1');

      ws.onopen = function() {
        fetch('http://localhost:4000/public/stream-state')
          .then(function(r) { return r.json(); })
          .then(update);
      };

      ws.onmessage = function(msg) {
        try {
          var parsed = JSON.parse(msg.data);
          if (parsed.event === 'stream-state') update(parsed.data);
        } catch(e) {}
      };

      ws.onclose = function() {
        stopTicking();
        setTimeout(connectWS, 2000);
      };

      ws.onerror = function() { ws.close(); };
    }

    connectWS();
  </script>
</body>
</html>
