<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #ff2d7b;
      --color-secondary: #00d4ff;
      --color-accent: #ffd700;
      --color-bg: #0a0a0a;
      --font-display: 'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; font-family: var(--font-body); overflow: hidden; }

    .alert-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .alert {
      position: relative;
      padding: 18px 28px;
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      text-align: left;
      font-family: var(--font-display);
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      animation: alertSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1), alertSlideOut 0.4s ease-in forwards;
      animation-delay: 0s, 4s;
      min-width: 280px;
    }

    .alert .sub {
      font-size: 12px;
      font-weight: 400;
      font-family: var(--font-body);
      color: #888;
      margin-top: 4px;
      text-transform: none;
      letter-spacing: 0.5px;
    }

    /* Reward: electric blue text accent */
    .alert.reward {
      color: var(--color-secondary);
    }

    /* Compile / Hype: orange text accent */
    .alert.compile {
      color: #ff6b35;
      animation: alertSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1), alertSlideOut 0.4s ease-in forwards;
      animation-delay: 0s, 4s;
    }

    @keyframes alertSlideIn {
      from { opacity: 0; transform: translateX(80px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes alertSlideOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(60px); }
    }
  </style>
</head>
<body>
  <div class="alert-container" id="container"></div>

  <script>
(function() {
  var name = 'alerts';
  var origin = window.location.origin || 'http://localhost:4000';
  window.__overlayOrigin = origin;
  window.__overlayWs = origin.replace(/^http/, 'ws');
  document.documentElement.style.visibility = 'hidden';
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return r + ' ' + g + ' ' + b;
  }
  fetch(origin + '/public/overlay-config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
      var root = document.documentElement;
      Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
      ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
        if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
      });
      var fonts = [vars['--font-display'], vars['--font-body']].filter(Boolean);
      if (fonts.length > 0) {
        var families = fonts.map(function(f) { return f.split(',')[0].replace(/'/g, '').trim(); });
        var link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=' + families.map(function(f) { return encodeURIComponent(f) + ':wght@400;600;700'; }).join('&') + '&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
    })
    .catch(function() {})
    .finally(function() { document.documentElement.style.visibility = 'visible'; });
  window.__applyOverlayConfig = function(config) {
    var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
    var root = document.documentElement;
    Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
    ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
      if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
    });
  };
})();
</script>
  <script>
    const ws = new WebSocket(`${window.__overlayWs}?overlay=1`);
    const container = document.getElementById('container');

    const REWARD_LABELS = {
      roulette: '\uD83C\uDFB0 Gl\u00FCcksrad!',
      feature_request: '\uD83D\uDCA1 Vorschlag!',
      change_music: '\uD83C\uDFB5 Musik wechseln!',
    };

    function showAlert(title, subtitle, type = '') {
      const el = document.createElement('div');
      el.className = 'alert ' + type;
      const titleEl = document.createElement('span');
      titleEl.textContent = title;
      el.appendChild(titleEl);
      if (subtitle) {
        const sub = document.createElement('div');
        sub.className = 'sub';
        sub.textContent = subtitle;
        el.appendChild(sub);
      }
      container.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }

    ws.onmessage = (msg) => {
      const { event, data } = JSON.parse(msg.data);

      if (event === 'overlay-config' && window.__applyOverlayConfig) window.__applyOverlayConfig(data);

      switch (event) {
        case 'reward-redeemed':
          showAlert(
            REWARD_LABELS[data.reward_type] || '\uD83C\uDF81 Reward!',
            `von ${data.user_name}`,
            'reward'
          );
          break;

        case 'compile-pray':
          showAlert('\u26A1 HYPE MOMENT \u26A1', 'L\u00E4uft es? Oder crashed es?', 'compile');
          break;

        case 'roulette-result':
          showAlert('\uD83C\uDFB0 GL\u00DCCKSRAD', `\u27A1\uFE0F ${data.title}`, 'compile');
          break;
      }
    };
  </script>
</body>
</html>
