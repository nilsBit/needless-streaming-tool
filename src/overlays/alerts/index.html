<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #ff2d7b;
      --color-secondary: #00d4ff;
      --color-accent: #39ff14;
      --color-text: #ffffff;
      --color-bg: #0a0a0a;
      --color-bg-opacity: 0.92;
      --color-bg-secondary: #0d0d0d;
      --color-primary-rgb: 255 45 123;
      --color-secondary-rgb: 0 212 255;
      --color-accent-rgb: 57 255 20;
      --color-bg-rgb: 10 10 10;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-size-base: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; font-family: var(--font-body); overflow: hidden; }

    .alert-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .alert {
      position: relative;
      padding: 18px 36px 18px 28px;
      background: rgb(var(--color-bg-rgb) / 0.93);
      border: 3px solid #ff6b35;
      color: var(--color-text);
      font-size: 18px;
      font-weight: 700;
      text-align: left;
      font-family: var(--font-display);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
      transform: skewX(-3deg);
      animation: alertSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1), alertSlideOut 0.4s ease-in forwards;
      animation-delay: 0s, 4s;
      overflow: hidden;
      min-width: 280px;
    }

    /* Spray paint noise texture */
    .alert::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 3px,
        rgba(255, 255, 255, 0.015) 3px,
        rgba(255, 255, 255, 0.015) 6px
      );
      pointer-events: none;
    }

    /* Diagonal stripe accent on left */
    .alert::after {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0; width: 6px;
      background: repeating-linear-gradient(
        45deg,
        #ff6b35,
        #ff6b35 2px,
        transparent 2px,
        transparent 5px
      );
    }

    .alert .sub {
      font-size: 12px;
      font-weight: 400;
      font-family: var(--font-body);
      color: #888;
      margin-top: 4px;
      text-transform: none;
      letter-spacing: 0.5px;
      text-shadow: none;
    }

    /* Raid: magenta glow */
    .alert.raid {
      border-color: var(--color-primary);
      box-shadow: 0 0 20px rgb(var(--color-primary-rgb) / 0.5), inset 0 0 30px rgb(var(--color-primary-rgb) / 0.08);
      text-shadow: 0 0 10px rgb(var(--color-primary-rgb) / 0.6);
      animation: alertSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1), pulseRaid 1.5s ease-in-out infinite, alertSlideOut 0.4s ease-in forwards;
      animation-delay: 0s, 0s, 4s;
    }
    .alert.raid::after {
      background: repeating-linear-gradient(45deg, var(--color-primary), var(--color-primary) 2px, transparent 2px, transparent 5px);
    }

    /* Reward: electric blue */
    .alert.reward {
      border-color: var(--color-secondary);
      box-shadow: 0 0 15px rgb(var(--color-secondary-rgb) / 0.4), inset 0 0 25px rgb(var(--color-secondary-rgb) / 0.06);
      text-shadow: 0 0 10px rgb(var(--color-secondary-rgb) / 0.5);
    }
    .alert.reward::after {
      background: repeating-linear-gradient(45deg, var(--color-secondary), var(--color-secondary) 2px, transparent 2px, transparent 5px);
    }

    /* Compile / Hype: hot orange with neon explosion */
    .alert.compile {
      border-color: #ff6b35;
      box-shadow: 0 0 25px rgba(255, 107, 53, 0.6), 0 0 60px rgba(255, 107, 53, 0.2), inset 0 0 30px rgba(255, 107, 53, 0.08);
      text-shadow: 0 0 12px rgba(255, 107, 53, 0.7);
      animation: alertSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1), neonExplosion 0.8s ease-out, pulseCompile 2s ease-in-out infinite, alertSlideOut 0.4s ease-in forwards;
      animation-delay: 0s, 0s, 0.8s, 4s;
    }
    .alert.compile::after {
      background: repeating-linear-gradient(45deg, #ff6b35, #ff6b35 2px, var(--color-accent) 2px, var(--color-accent) 4px, transparent 4px, transparent 7px);
    }

    @keyframes alertSlideIn {
      from { opacity: 0; transform: translateX(80px) skewX(-3deg); }
      to { opacity: 1; transform: translateX(0) skewX(-3deg); }
    }

    @keyframes alertSlideOut {
      from { opacity: 1; transform: translateX(0) skewX(-3deg); }
      to { opacity: 0; transform: translateX(60px) skewX(-3deg); }
    }

    @keyframes pulseRaid {
      0%, 100% { box-shadow: 0 0 20px rgb(var(--color-primary-rgb) / 0.5), inset 0 0 30px rgb(var(--color-primary-rgb) / 0.08); }
      50% { box-shadow: 0 0 35px rgb(var(--color-primary-rgb) / 0.8), inset 0 0 40px rgb(var(--color-primary-rgb) / 0.15); }
    }

    @keyframes pulseCompile {
      0%, 100% { box-shadow: 0 0 25px rgba(255, 107, 53, 0.6), 0 0 60px rgba(255, 107, 53, 0.2); }
      50% { box-shadow: 0 0 40px rgba(255, 107, 53, 0.9), 0 0 80px rgba(255, 107, 53, 0.35); }
    }

    @keyframes neonExplosion {
      0% { box-shadow: 0 0 80px rgba(255, 107, 53, 1), 0 0 120px rgb(var(--color-accent-rgb) / 0.6); border-color: #fff; }
      50% { box-shadow: 0 0 50px rgba(255, 107, 53, 0.7), 0 0 80px rgb(var(--color-accent-rgb) / 0.3); }
      100% { box-shadow: 0 0 25px rgba(255, 107, 53, 0.6), 0 0 60px rgba(255, 107, 53, 0.2); border-color: #ff6b35; }
    }
  </style>
</head>
<body>
  <div class="alert-container" id="container"></div>

  <script>
(function() {
  var name = 'alerts';
  document.documentElement.style.visibility = 'hidden';
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return r + ' ' + g + ' ' + b;
  }
  fetch('http://localhost:4000/public/overlay-config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
      var root = document.documentElement;
      Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
      ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
        if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
      });
      var fonts = [vars['--font-display'], vars['--font-body']].filter(Boolean);
      if (fonts.length > 0) {
        var families = fonts.map(function(f) { return f.split(',')[0].replace(/'/g, '').trim(); });
        var link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=' + families.map(function(f) { return encodeURIComponent(f) + ':wght@400;600;700'; }).join('&') + '&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
    })
    .catch(function() {})
    .finally(function() { document.documentElement.style.visibility = 'visible'; });
  window.__applyOverlayConfig = function(config) {
    var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
    var root = document.documentElement;
    Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
    ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
      if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
    });
  };
})();
</script>
  <script>
    const ws = new WebSocket('ws://localhost:4000?overlay=1');
    const container = document.getElementById('container');

    const TIER_EMOJI = { mob: '\uD83D\uDDE1\uFE0F', elite: '\u2694\uFE0F', 'mini-boss': '\uD83D\uDC80', boss: '\uD83D\uDC51' };

    const REWARD_LABELS = {
      spawn_enemys: '\uD83D\uDCA5 Spawn 50 Enemys!',
      name_enemy: '\uD83D\uDCDB Enemy benennen!',
      roulette: '\uD83C\uDFB0 Gl\u00FCcksrad!',
      feature_request: '\uD83D\uDCA1 Feature Request!',
      change_music: '\uD83C\uDFB5 Musik wechseln!',
    };

    function showAlert(title, subtitle, type = '') {
      const el = document.createElement('div');
      el.className = 'alert ' + type;
      const titleEl = document.createElement('span');
      titleEl.textContent = title;
      el.appendChild(titleEl);
      if (subtitle) {
        const sub = document.createElement('div');
        sub.className = 'sub';
        sub.textContent = subtitle;
        el.appendChild(sub);
      }
      container.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }

    ws.onmessage = (msg) => {
      const { event, data } = JSON.parse(msg.data);

      if (event === 'overlay-config' && window.__applyOverlayConfig) window.__applyOverlayConfig(data);

      switch (event) {
        case 'raid-incoming':
          showAlert(
            `${TIER_EMOJI[data.enemy_tier] || '\u2694\uFE0F'} RAID!`,
            `${data.streamer_name} mit ${data.viewer_count} Viewern \u2014 ${data.enemy_tier} Enemy!`,
            'raid'
          );
          break;

        case 'reward-redeemed':
          showAlert(
            REWARD_LABELS[data.reward_type] || '\uD83C\uDF81 Reward!',
            `von ${data.user_name}`,
            'reward'
          );
          break;

        case 'compile-pray':
          showAlert('\u26A1 HYPE MOMENT \u26A1', 'L\u00E4uft es? Oder crashed es?', 'compile');
          break;

        case 'roulette-result':
          showAlert('\uD83C\uDFB0 GL\u00DCCKSRAD', `\u27A1\uFE0F ${data.title}`, 'compile');
          break;
      }
    };
  </script>
</body>
</html>
