<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #ff2d7b;
      --color-secondary: #00d4ff;
      --color-accent: #39ff14;
      --color-text: #ffffff;
      --color-bg: #0a0a0a;
      --color-bg-opacity: 0.92;
      --color-bg-secondary: #0d0d0d;
      --color-primary-rgb: 255 45 123;
      --color-secondary-rgb: 0 212 255;
      --color-accent-rgb: 57 255 20;
      --color-bg-rgb: 10 10 10;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-size-base: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent !important; background-color: rgba(0,0,0,0) !important; font-family: var(--font-body); overflow: hidden; }

    .song {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      background: rgb(var(--color-bg-rgb) / 0.95);
      border: 3px solid var(--color-accent);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 15px rgb(var(--color-accent-rgb) / 0.4);
      animation: songSlideIn 0.5s ease-out;
    }

    .song::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgb(var(--color-accent-rgb) / 0.03) 10px,
        rgb(var(--color-accent-rgb) / 0.03) 20px
      );
      pointer-events: none;
    }

    .song.visible { display: flex; animation: songSlideIn 0.5s ease-out; }

    @keyframes songSlideIn {
      0% { opacity: 0; transform: translateX(-40px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    /* NOW PLAYING label */
    .now-playing {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--color-accent);
      text-transform: uppercase;
      text-shadow: 0 0 8px rgb(var(--color-accent-rgb) / 0.6);
      transform: skewX(-3deg);
      display: inline-block;
      padding: 2px 8px;
      background: rgb(var(--color-accent-rgb) / 0.1);
      border-left: 2px solid var(--color-accent);
      margin-bottom: 2px;
    }

    /* Equalizer bars */
    .equalizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 24px;
      flex-shrink: 0;
    }

    .eq-bar {
      width: 4px;
      background: var(--color-accent);
      box-shadow: 0 0 4px rgb(var(--color-accent-rgb) / 0.6);
      animation: eqBounce 0.8s ease-in-out infinite alternate;
    }

    .eq-bar:nth-child(1) { height: 60%; animation-delay: 0s; }
    .eq-bar:nth-child(2) { height: 100%; animation-delay: 0.15s; }
    .eq-bar:nth-child(3) { height: 40%; animation-delay: 0.3s; }
    .eq-bar:nth-child(4) { height: 80%; animation-delay: 0.45s; }
    .eq-bar:nth-child(5) { height: 50%; animation-delay: 0.1s; }

    @keyframes eqBounce {
      0% { transform: scaleY(0.3); }
      100% { transform: scaleY(1); }
    }

    .song-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .song-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgb(var(--color-secondary-rgb) / 0.4), 2px 2px 0 rgba(0,0,0,0.6);
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-requester {
      font-size: 11px;
      font-weight: 600;
      color: #ff6b35;
      text-shadow: 0 0 4px rgba(255,107,53,0.3);
    }

    /* Accent corner */
    .song::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 30px; height: 3px;
      background: var(--color-primary);
      box-shadow: 0 0 8px rgb(var(--color-primary-rgb) / 0.5);
    }
  </style>
</head>
<body>
  <div class="song" id="song">
    <div class="equalizer">
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
    </div>
    <div class="song-info">
      <div class="now-playing">NOW PLAYING</div>
      <span class="song-title" id="song-title"></span>
      <span class="song-requester" id="song-requester"></span>
    </div>
  </div>

  <script>
(function() {
  var name = 'song';
  document.documentElement.style.visibility = 'hidden';
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return r + ' ' + g + ' ' + b;
  }
  fetch('http://localhost:4000/public/overlay-config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
      var root = document.documentElement;
      Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
      ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
        if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
      });
      var fonts = [vars['--font-display'], vars['--font-body']].filter(Boolean);
      if (fonts.length > 0) {
        var families = fonts.map(function(f) { return f.split(',')[0].replace(/'/g, '').trim(); });
        var link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=' + families.map(function(f) { return encodeURIComponent(f) + ':wght@400;600;700'; }).join('&') + '&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
    })
    .catch(function() {})
    .finally(function() { document.documentElement.style.visibility = 'visible'; });
  window.__applyOverlayConfig = function(config) {
    var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
    var root = document.documentElement;
    Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
    ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
      if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
    });
  };
})();
</script>
  <script>
    const ws = new WebSocket('ws://localhost:4000?overlay=1');
    const song = document.getElementById('song');
    const songTitle = document.getElementById('song-title');
    const songRequester = document.getElementById('song-requester');

    ws.onmessage = (msg) => {
      const { event, data } = JSON.parse(msg.data);

      if (event === 'overlay-config' && window.__applyOverlayConfig) window.__applyOverlayConfig(data);

      if (event === 'song-update') {
        song.classList.add('visible');
        songTitle.textContent = data.title || 'Unknown';
        songRequester.textContent = data.artist || '';
      }

      if (event === 'song-clear') {
        song.classList.remove('visible');
      }
    };
  </script>
</body>
</html>
