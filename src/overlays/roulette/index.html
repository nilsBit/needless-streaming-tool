<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Lucky Spin - OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary: #ffffff;
    --color-secondary: #cccccc;
    --color-accent: #ffffff;
    --color-bg: #0a0a0a;
    --font-display: 'Rajdhani', sans-serif;
    --font-body: 'Inter', sans-serif;
    --color-text: #ffffff;
    --color-primary-rgb: 255 255 255;
    --color-secondary-rgb: 204 204 204;
    --color-accent-rgb: 255 255 255;
    --color-bg-rgb: 10 10 10;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent !important;
    background-color: rgba(0,0,0,0) !important;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--font-body);
    overflow: hidden;
    max-width: 100vw;
    overflow-x: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
  }

  .container.visible {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  .container.hiding {
    opacity: 0;
    transform: scale(0.8) translateY(-20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .neon-box {
    background: rgba(10,10,10,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .counter {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px;
  }

  .counter .diamond {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    animation: orbFloat 2s ease-in-out infinite;
  }

  .counter .pts {
    color: var(--color-text);
    font-family: var(--font-display);
    font-size: 16px;
    letter-spacing: 2px;
  }

  .counter .label {
    color: #666;
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 2px;
  }

  .wheel-wrapper {
    position: relative;
    width: min(320px, 90vw);
    height: min(320px, 90vw);
  }

  .wheel-rotate { width: min(320px, 90vw); height: min(320px, 90vw); }

  .orb {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
  }

  .pointer-wrap {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
  }

  .result {
    padding: 14px 28px;
    text-align: center;
    animation: fadeIn 0.4s ease-out forwards;
  }

  .result-label {
    color: rgba(255,255,255,0.5);
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 4px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .result-value {
    font-family: var(--font-display);
    font-size: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .result-sub {
    font-family: var(--font-body);
    font-size: 10px;
    margin-top: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hidden { display: none; }

  @keyframes fadeIn {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @keyframes orbFloat {
    0% { transform: translateY(0); opacity: .4; }
    50% { transform: translateY(-4px); opacity: .8; }
    100% { transform: translateY(0); opacity: .4; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="counter neon-box">
    <span class="diamond">&#9670;</span>
    <span class="pts" id="totalPts">0</span>
    <span class="label">PTS</span>
  </div>

  <div class="wheel-wrapper">
    <div id="orbs"></div>

    <div class="pointer-wrap" id="pointer">
      <svg width="28" height="40" viewBox="0 0 14 20">
        <polygon points="7,0 14,18 0,18" fill="#ffffff" stroke="#0a0a0a" stroke-width="1"/>
        <polygon points="7,3 11,16 3,16" fill="rgba(255,255,255,0.4)"/>
      </svg>
    </div>

    <div class="wheel-rotate" id="wheel"></div>
  </div>

  <div class="result neon-box hidden" id="resultBox">
    <div class="result-label">ERGEBNIS</div>
    <div class="result-value" id="resultValue"></div>
    <div class="result-sub" id="resultSub"></div>
  </div>
</div>

<script>
(function() {
  var name = 'roulette';
  var origin = window.location.origin || 'http://localhost:4000';
  window.__overlayOrigin = origin;
  window.__overlayWs = origin.replace(/^http/, 'ws');
  document.documentElement.style.visibility = 'hidden';
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return r + ' ' + g + ' ' + b;
  }
  fetch(origin + '/public/overlay-config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
      var root = document.documentElement;
      Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
      ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
        if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
      });
      var fonts = [vars['--font-display'], vars['--font-body']].filter(Boolean);
      if (fonts.length > 0) {
        var families = fonts.map(function(f) { return f.split(',')[0].replace(/'/g, '').trim(); });
        var link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=' + families.map(function(f) { return encodeURIComponent(f) + ':wght@400;600;700'; }).join('&') + '&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
    })
    .catch(function() {})
    .finally(function() { document.documentElement.style.visibility = 'visible'; });
  window.__applyOverlayConfig = function(config) {
    var vars = Object.assign({}, config.global || {}, (config.overrides || {})[name] || {});
    var root = document.documentElement;
    Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
    ['--color-primary', '--color-secondary', '--color-accent', '--color-bg'].forEach(function(k) {
      if (vars[k]) root.style.setProperty(k + '-rgb', hexToRgb(vars[k]));
    });
  };
})();
</script>
<script>
// Dynamic segments from issues API — NFS Unbound neon palette
const PALETTE = [
  { bg: "#1a0a1e", txt: "#ff2d7b" },
  { bg: "#0a1520", txt: "#00d4ff" },
  { bg: "#0a1a0a", txt: "#39ff14" },
  { bg: "#1a1005", txt: "#ff6b35" },
  { bg: "#150a1e", txt: "#ff2d7b" },
  { bg: "#051520", txt: "#00d4ff" },
  { bg: "#0f1a05", txt: "#39ff14" },
  { bg: "#1a0f05", txt: "#ff6b35" },
];

let SEGMENTS = [];
let N, ANG;
const R=140, CX=160, CY=160;
let rotation=0, spinning=false, total=0;
let pendingWinnerId = null;
let hideTimeout = null;
const RESULT_DISPLAY_MS = 6000; // Show result for 6 seconds then hide
const container = () => document.querySelector('.container');

function showOverlay() {
  if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
  const el = container();
  el.classList.remove('hiding');
  el.classList.add('visible');
}

function hideOverlay() {
  const el = container();
  el.classList.add('hiding');
  el.classList.remove('visible');
  setTimeout(() => {
    el.classList.remove('hiding');
    document.getElementById('resultBox').classList.add('hidden');
  }, 800);
}

// Fetch issues from API and build segments
async function loadIssues() {
  try {
    const res = await fetch(`${window.__overlayOrigin}/public/issues`);
    const issues = await res.json();
    const openIssues = issues.filter(b => b.status === 'open');

    if (openIssues.length === 0) {
      SEGMENTS = [{ id: 0, label: "KEINE ISSUES", bg: "#1a1a1a", txt: "#444", title: "Keine offenen Issues" }];
    } else {
      SEGMENTS = openIssues.map((issue, i) => {
        const style = PALETTE[i % PALETTE.length];
        // Truncate long titles for the wheel
        const label = issue.title.length > 12 ? issue.title.substring(0, 11) + '\u2026' : issue.title;
        return { id: issue.id, label, bg: style.bg, txt: style.txt, title: issue.title };
      });
    }

    N = SEGMENTS.length;
    ANG = 360 / N;
    buildWheel();
    buildOrbs();
  } catch (err) {
    console.error('[Roulette] Failed to load issues:', err);
  }
}

// WebSocket for live updates
const ws = new WebSocket(`${window.__overlayWs}?overlay=1`);

ws.onmessage = (e) => {
  try {
    const msg = JSON.parse(e.data);

    if (msg.event === 'overlay-config' && window.__applyOverlayConfig) window.__applyOverlayConfig(msg.data);

    // Issues changed — rebuild wheel
    if (msg.event === 'issue-created' || msg.event === 'issue-updated' || msg.event === 'issue-deleted') {
      if (!spinning) loadIssues();
    }

    // Roulette triggered from dashboard/API — auto-spin to winner
    if (msg.event === 'roulette-spin' && !spinning) {
      pendingWinnerId = msg.data.winner_id;
      spin();
    }
  } catch {}
};

ws.onclose = () => setTimeout(() => location.reload(), 3000);

function p2c(cx,cy,r,d){const a=(d-90)*Math.PI/180;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}
function ap(cx,cy,r,s,e){const sp=p2c(cx,cy,r,s),ep=p2c(cx,cy,r,e);return`M${cx},${cy} L${sp.x},${sp.y} A${r},${r} 0 ${e-s>180?1:0} 1 ${ep.x},${ep.y} Z`;}
function lh(h,a){return`rgb(${Math.min(255,parseInt(h.slice(1,3),16)+a)},${Math.min(255,parseInt(h.slice(3,5),16)+a)},${Math.min(255,parseInt(h.slice(5,7),16)+a)})`;}
function dh(h,a){return`rgb(${Math.max(0,parseInt(h.slice(1,3),16)-a)},${Math.max(0,parseInt(h.slice(3,5),16)-a)},${Math.max(0,parseInt(h.slice(5,7),16)-a)})`;}

function buildWheel(){
  if (!SEGMENTS.length) return;
  let defs='';
  SEGMENTS.forEach((s,i)=>{
    const c2=i%2===0?lh(s.bg,18):dh(s.bg,10);
    defs+=`<pattern id="d${i}" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="${s.bg}"/><rect x="0" y="0" width="2" height="2" fill="${c2}"/><rect x="2" y="2" width="2" height="2" fill="${c2}"/></pattern>`;
  });
  defs+=`<pattern id="pg" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="transparent"/><rect x="0" y="0" width="4" height="1" fill="rgba(0,0,0,0.06)"/><rect x="0" y="0" width="1" height="4" fill="rgba(0,0,0,0.06)"/></pattern><clipPath id="wc"><circle cx="${CX}" cy="${CY}" r="${R}"/></clipPath>`;

  // Neon outer ring
  let outer='';
  for(let i=0;i<72;i++){
    const a=i*5*Math.PI/180,x=Math.round((CX+(R+6)*Math.cos(a))/2)*2-2,y=Math.round((CY+(R+6)*Math.sin(a))/2)*2-2;
    const neonColors = ['#ff2d7b','#00d4ff','#39ff14','#ff6b35'];
    const c = i%3===0 ? neonColors[i%4] : '#1a1a1a';
    outer+=`<rect x="${x}" y="${y}" width="4" height="4" fill="${c}" opacity="${i%3===0?'0.8':'0.3'}"/>`;
  }

  // Adjust font size based on segment count
  const fontSize = N <= 6 ? 9 : N <= 10 ? 8 : 7;
  const labelRadius = N <= 6 ? R*0.58 : R*0.62;

  let segs='';
  SEGMENTS.forEach((s,i)=>{
    const sd=i*ANG,ed=(i+1)*ANG,md=sd+ANG/2,lp=p2c(CX,CY,labelRadius,md),sp=p2c(CX,CY,24,sd),ep=p2c(CX,CY,R,sd);
    // Segment fill
    segs+=`<path d="${ap(CX,CY,R,sd,ed)}" fill="url(#d${i})"/>`;
    // Neon border between segments
    segs+=`<path d="${ap(CX,CY,R,sd,ed)}" fill="none" stroke="${s.txt}" stroke-width="1" opacity="0.3"/>`;
    segs+=`<line x1="${sp.x}" y1="${sp.y}" x2="${ep.x}" y2="${ep.y}" stroke="${s.txt}" stroke-width="1" opacity="0.4"/>`;
    // Decorative dots
    [0.2,0.4,0.6,0.8].forEach(t=>{const dp=p2c(CX,CY,R-10,sd+ANG*t);segs+=`<rect x="${Math.round(dp.x/2)*2-1}" y="${Math.round(dp.y/2)*2-1}" width="2" height="2" fill="${s.txt}" opacity="0.3"/>`;});
    const dp2=p2c(CX,CY,R-4,md);segs+=`<rect x="${Math.round(dp2.x/2)*2-1}" y="${Math.round(dp2.y/2)*2-1}" width="3" height="3" fill="${s.txt}" opacity="0.4"/>`;
    // Labels with neon glow
    segs+=`<g transform="translate(${lp.x},${lp.y}) rotate(${md})"><text text-anchor="middle" dominant-baseline="central" fill="${s.txt}" font-size="${fontSize}" font-family="'Bebas Neue',sans-serif" letter-spacing="1" opacity="0.3" dx="1" dy="1">${s.label}</text><text text-anchor="middle" dominant-baseline="central" fill="${s.txt}" font-size="${fontSize}" font-family="'Bebas Neue',sans-serif" letter-spacing="1">${s.label}</text></g>`;
  });

  // Inner ring with neon
  let inner='';
  for(let i=0;i<48;i++){
    const a=i*7.5*Math.PI/180,x=Math.round((CX+26*Math.cos(a))/2)*2-1,y=Math.round((CY+26*Math.sin(a))/2)*2-1;
    const neonColors = ['#ff2d7b','#00d4ff','#39ff14','#ff6b35'];
    inner+=`<rect x="${x}" y="${y}" width="2" height="2" fill="${i%2===0?neonColors[i%4]:'#222'}" opacity="${i%2===0?'0.6':'0.3'}"/>`;
  }

  document.getElementById('wheel').innerHTML=`<svg width="320" height="320" viewBox="0 0 320 320"><defs>${defs}</defs>${outer}${segs}<circle cx="${CX}" cy="${CY}" r="${R}" fill="url(#pg)" clip-path="url(#wc)"/><circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="#ff2d7b" stroke-width="2" opacity="0.5"/>${inner}<circle cx="${CX}" cy="${CY}" r="20" fill="#0a0a0a" stroke="#ff2d7b" stroke-width="2" opacity="0.8"/><circle cx="${CX}" cy="${CY}" r="14" fill="#050505" stroke="#00d4ff" stroke-width="1" opacity="0.6"/><rect x="${CX-1}" y="${CY-8}" width="2" height="16" fill="#00d4ff" opacity="0.5"/><rect x="${CX-8}" y="${CY-1}" width="16" height="2" fill="#00d4ff" opacity="0.5"/><rect x="${CX-3}" y="${CY-3}" width="6" height="6" fill="#ff2d7b" rx="1"/><rect x="${CX-1}" y="${CY-1}" width="2" height="2" fill="#fff"/></svg>`;

  document.getElementById('totalPts').textContent = N + ' ISSUES';
}

function buildOrbs(){
  let h='';
  for(let i=0;i<8;i++){
    const a=(i*45+22.5)*Math.PI/180,r=178;
    h+=`<div class="orb" style="left:calc(50% + ${Math.cos(a)*r}px - 3px);top:calc(50% + ${Math.sin(a)*r}px - 3px);background:rgba(255,255,255,0.3);box-shadow:0 0 8px rgba(255,255,255,0.1);animation:orbFloat ${2+i*0.3}s ease-in-out infinite;animation-delay:${i*0.25}s"></div>`;
  }
  document.getElementById('orbs').innerHTML=h;
}

function spin(){
  if(spinning || !SEGMENTS.length) return;
  spinning=true;
  showOverlay();
  document.getElementById('resultBox').classList.add('hidden');
  document.getElementById('pointer').classList.add('active');

  // If we have a predetermined winner from the API, calculate target angle
  let targetAngle;
  if (pendingWinnerId !== null) {
    const winnerIdx = SEGMENTS.findIndex(s => s.id === pendingWinnerId);
    if (winnerIdx >= 0) {
      // Land in the middle of the winner segment
      targetAngle = 360 - (winnerIdx * ANG + ANG / 2);
    } else {
      targetAngle = Math.random() * 360;
    }
    pendingWinnerId = null;
  } else {
    targetAngle = Math.random() * 360;
  }

  const spins = 5 + Math.random() * 3;
  const totalDeg = spins * 360 + targetAngle;
  const startRot=rotation,endRot=startRot+totalDeg,dur=5000,t0=performance.now();

  function anim(now){
    const p=Math.min((now-t0)/dur,1),eased=1-Math.pow(1-p,4);
    document.getElementById('wheel').style.transform=`rotate(${startRot+totalDeg*eased}deg)`;
    if(p<1){requestAnimationFrame(anim);}
    else{
      rotation=endRot;
      document.getElementById('wheel').style.transform=`rotate(${endRot}deg)`;
      const norm=((360-(endRot%360))+360)%360,idx=Math.floor(norm/ANG)%N,won=SEGMENTS[idx];

      const box=document.getElementById('resultBox'),val=document.getElementById('resultValue'),sub=document.getElementById('resultSub');
      box.classList.remove('hidden');box.className='result neon-box explosion';
      val.style.color=won.txt;
      val.style.textShadow=`2px 2px 0 #000, 0 0 15px ${won.txt}`;
      sub.style.color='#666';
      val.textContent = '\u25BA ' + (won.title || won.label);
      sub.textContent = 'ALS N\u00C4CHSTES DRAN';

      spinning=false;
      document.getElementById('pointer').classList.remove('active');

      // Hide overlay after showing result
      hideTimeout = setTimeout(() => { hideOverlay(); }, RESULT_DISPLAY_MS);
    }
  }
  requestAnimationFrame(anim);
}

loadIssues();
</script>
</body>
</html>
