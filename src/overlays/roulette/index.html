<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Lucky Spin - OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent !important;
    background-color: rgba(0,0,0,0) !important;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    image-rendering: pixelated;
    overflow: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .pixel-box {
    background: rgba(10,10,10,0.85);
    border: 2px solid #333;
    box-shadow: inset -2px -2px 0 #000, inset 2px 2px 0 #1a1a1a, 4px 4px 0 rgba(0,0,0,0.6);
  }

  .counter { display: flex; align-items: center; gap: 8px; padding: 6px 14px; }
  .counter .diamond { color: #ccc; font-size: 10px; animation: orbFloat 2s ease-in-out infinite; }
  .counter .pts { color: #888; font-size: 10px; }
  .counter .label { color: #444; font-size: 7px; }

  .wheel-wrapper { position: relative; width: 320px; height: 320px; }
  .wheel-rotate { width: 320px; height: 320px; }

  .orb {
    position: absolute; width: 4px; height: 4px;
    background: #fff; image-rendering: pixelated;
  }

  .pointer-wrap {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%); z-index: 20;
    image-rendering: pixelated;
    animation: pointerPulse 2.5s ease-in-out infinite;
  }
  .pointer-wrap.active { animation: pointerPulse 0.15s ease-in-out infinite; }

  .spin-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px; color: #e0e0e0;
    padding: 8px 24px; cursor: pointer;
    letter-spacing: 2px; transition: all 0.2s;
    background: rgba(26,26,26,0.9); border: 2px solid #444;
    box-shadow: inset -2px -2px 0 #000, inset 2px 2px 0 #1a1a1a, 4px 4px 0 rgba(0,0,0,0.6);
  }
  .spin-btn:hover { border-color: #666; }
  .spin-btn:disabled { color: #333; background: rgba(10,10,10,0.9); border-color: #1a1a1a; cursor: not-allowed; }

  .result { padding: 10px 24px; text-align: center; animation: fadeIn 0.4s ease-out forwards; }
  .result-label { color: #555; font-size: 6px; letter-spacing: 3px; margin-bottom: 4px; }
  .result-value { font-size: 14px; text-shadow: 1px 1px 0 #000; }
  .result-sub { font-size: 6px; margin-top: 3px; letter-spacing: 2px; }

  .hidden { display: none; }

  @keyframes fadeIn { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
  @keyframes pointerPulse {
    0%,100% { filter: drop-shadow(0 0 2px rgba(255,255,255,0.1)); }
    50% { filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
  }
  @keyframes orbFloat {
    0% { transform:translateY(0);opacity:.3 }
    50% { transform:translateY(-4px);opacity:.6 }
    100% { transform:translateY(0);opacity:.3 }
  }
</style>
</head>
<body>

<div class="container">
  <div class="counter pixel-box">
    <span class="diamond">◆</span>
    <span class="pts" id="totalPts">0</span>
    <span class="label">PTS</span>
  </div>

  <div class="wheel-wrapper">
    <div id="orbs"></div>

    <div class="pointer-wrap" id="pointer">
      <svg width="24" height="36" viewBox="0 0 12 18" style="image-rendering:pixelated">
        <rect x="5" y="0" width="2" height="2" fill="#ccc"/>
        <rect x="4" y="2" width="4" height="2" fill="#aaa"/>
        <rect x="3" y="4" width="6" height="2" fill="#888"/>
        <rect x="2" y="6" width="8" height="2" fill="#666"/>
        <rect x="1" y="8" width="10" height="2" fill="#555"/>
        <rect x="0" y="10" width="12" height="2" fill="#444"/>
        <rect x="5" y="0" width="1" height="2" fill="#fff"/>
        <rect x="4" y="2" width="1" height="2" fill="#ddd"/>
        <rect x="3" y="4" width="1" height="2" fill="#bbb"/>
        <rect x="5" y="0" width="2" height="1" fill="#eee"/>
      </svg>
    </div>

    <div class="wheel-rotate" id="wheel"></div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">► DREHEN</button>

  <div class="result pixel-box hidden" id="resultBox">
    <div class="result-label">ERGEBNIS</div>
    <div class="result-value" id="resultValue"></div>
    <div class="result-sub" id="resultSub"></div>
  </div>
</div>

<script>
const SEGMENTS = [
  { label: "JACKPOT", bg: "#2a2a2a", txt: "#e8e8e8", prize: 500 },
  { label: "50",      bg: "#1a1a1a", txt: "#999999", prize: 50 },
  { label: "LEER",    bg: "#0f0f0f", txt: "#444444", prize: 0 },
  { label: "100",     bg: "#242424", txt: "#cccccc", prize: 100 },
  { label: "25",      bg: "#161616", txt: "#777777", prize: 25 },
  { label: "200",     bg: "#303030", txt: "#e0e0e0", prize: 200 },
  { label: "FLUCH",   bg: "#0c0c0c", txt: "#555555", prize: -50 },
  { label: "75",      bg: "#1e1e1e", txt: "#aaaaaa", prize: 75 },
];

const N=SEGMENTS.length, ANG=360/N, R=140, CX=160, CY=160;
let rotation=0, spinning=false, total=0;

function p2c(cx,cy,r,d){const a=(d-90)*Math.PI/180;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}
function ap(cx,cy,r,s,e){const sp=p2c(cx,cy,r,s),ep=p2c(cx,cy,r,e);return`M${cx},${cy} L${sp.x},${sp.y} A${r},${r} 0 ${e-s>180?1:0} 1 ${ep.x},${ep.y} Z`;}
function lh(h,a){return`rgb(${Math.min(255,parseInt(h.slice(1,3),16)+a)},${Math.min(255,parseInt(h.slice(3,5),16)+a)},${Math.min(255,parseInt(h.slice(5,7),16)+a)})`;}
function dh(h,a){return`rgb(${Math.max(0,parseInt(h.slice(1,3),16)-a)},${Math.max(0,parseInt(h.slice(3,5),16)-a)},${Math.max(0,parseInt(h.slice(5,7),16)-a)})`;}

function buildWheel(){
  let defs='';
  SEGMENTS.forEach((s,i)=>{
    const c2=i%2===0?lh(s.bg,18):dh(s.bg,10);
    defs+=`<pattern id="d${i}" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="${s.bg}"/><rect x="0" y="0" width="2" height="2" fill="${c2}"/><rect x="2" y="2" width="2" height="2" fill="${c2}"/></pattern>`;
  });
  defs+=`<pattern id="pg" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="transparent"/><rect x="0" y="0" width="4" height="1" fill="rgba(0,0,0,0.06)"/><rect x="0" y="0" width="1" height="4" fill="rgba(0,0,0,0.06)"/></pattern><clipPath id="wc"><circle cx="${CX}" cy="${CY}" r="${R}"/></clipPath>`;

  let outer='';
  for(let i=0;i<72;i++){const a=i*5*Math.PI/180,x=Math.round((CX+(R+6)*Math.cos(a))/2)*2-2,y=Math.round((CY+(R+6)*Math.sin(a))/2)*2-2;outer+=`<rect x="${x}" y="${y}" width="4" height="4" fill="${i%3===0?'#333':'#1a1a1a'}"/>`;}

  let segs='';
  SEGMENTS.forEach((s,i)=>{
    const sd=i*ANG,ed=(i+1)*ANG,md=sd+ANG/2,lp=p2c(CX,CY,R*0.58,md),sp=p2c(CX,CY,24,sd),ep=p2c(CX,CY,R,sd);
    segs+=`<path d="${ap(CX,CY,R,sd,ed)}" fill="url(#d${i})"/><path d="${ap(CX,CY,R,sd,ed)}" fill="none" stroke="#000" stroke-width="2"/><line x1="${sp.x}" y1="${sp.y}" x2="${ep.x}" y2="${ep.y}" stroke="#000" stroke-width="2"/>`;
    [0.2,0.4,0.6,0.8].forEach(t=>{const dp=p2c(CX,CY,R-10,sd+ANG*t);segs+=`<rect x="${Math.round(dp.x/2)*2-1}" y="${Math.round(dp.y/2)*2-1}" width="2" height="2" fill="${s.txt}" opacity="0.2"/>`;});
    const dp2=p2c(CX,CY,R-4,md);segs+=`<rect x="${Math.round(dp2.x/2)*2-1}" y="${Math.round(dp2.y/2)*2-1}" width="3" height="3" fill="${s.txt}" opacity="0.3"/>`;
    segs+=`<g transform="translate(${lp.x},${lp.y}) rotate(${md})"><text text-anchor="middle" dominant-baseline="central" fill="#000" font-size="8" font-family="'Press Start 2P',monospace" dy="1" dx="1">${s.label}</text><text text-anchor="middle" dominant-baseline="central" fill="${s.txt}" font-size="8" font-family="'Press Start 2P',monospace">${s.label}</text></g>`;
  });

  let inner='';
  for(let i=0;i<48;i++){const a=i*7.5*Math.PI/180,x=Math.round((CX+26*Math.cos(a))/2)*2-1,y=Math.round((CY+26*Math.sin(a))/2)*2-1;inner+=`<rect x="${x}" y="${y}" width="2" height="2" fill="${i%2===0?'#444':'#222'}"/>`;}

  document.getElementById('wheel').innerHTML=`<svg width="320" height="320" viewBox="0 0 320 320" style="image-rendering:pixelated"><defs>${defs}</defs>${outer}${segs}<circle cx="${CX}" cy="${CY}" r="${R}" fill="url(#pg)" clip-path="url(#wc)"/><circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="#333" stroke-width="3"/>${inner}<circle cx="${CX}" cy="${CY}" r="20" fill="#111" stroke="#444" stroke-width="2"/><circle cx="${CX}" cy="${CY}" r="14" fill="#0a0a0a" stroke="#333" stroke-width="1"/><rect x="${CX-1}" y="${CY-8}" width="2" height="16" fill="#444"/><rect x="${CX-8}" y="${CY-1}" width="16" height="2" fill="#444"/><rect x="${CX-2}" y="${CY-2}" width="4" height="4" fill="#ddd"/><rect x="${CX-1}" y="${CY-1}" width="2" height="2" fill="#fff"/></svg>`;
}

function buildOrbs(){
  let h='';
  for(let i=0;i<8;i++){const a=(i*45+22.5)*Math.PI/180,r=178;h+=`<div class="orb" style="left:calc(50% + ${Math.cos(a)*r}px - 2px);top:calc(50% + ${Math.sin(a)*r}px - 2px);animation:orbFloat ${2+i*0.3}s ease-in-out infinite;animation-delay:${i*0.25}s"></div>`;}
  document.getElementById('orbs').innerHTML=h;
}

function spin(){
  if(spinning)return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinBtn').textContent='. . .';
  document.getElementById('resultBox').classList.add('hidden');
  document.getElementById('pointer').classList.add('active');

  const spins=5+Math.random()*5,target=Math.random()*360,totalDeg=spins*360+target;
  const startRot=rotation,endRot=startRot+totalDeg,dur=5000,t0=performance.now();

  function anim(now){
    const p=Math.min((now-t0)/dur,1),eased=1-Math.pow(1-p,4);
    document.getElementById('wheel').style.transform=`rotate(${startRot+totalDeg*eased}deg)`;
    if(p<1){requestAnimationFrame(anim);}
    else{
      rotation=endRot;
      document.getElementById('wheel').style.transform=`rotate(${endRot}deg)`;
      const norm=((360-(endRot%360))+360)%360,idx=Math.floor(norm/ANG)%N,won=SEGMENTS[idx];
      total=Math.max(0,total+won.prize);
      document.getElementById('totalPts').textContent=total;

      const box=document.getElementById('resultBox'),val=document.getElementById('resultValue'),sub=document.getElementById('resultSub');
      box.classList.remove('hidden');box.style.animation='none';box.offsetHeight;box.style.animation='fadeIn 0.4s ease-out forwards';
      val.style.color=won.txt;sub.style.color=won.label==='FLUCH'?'#333':'#555';

      if(won.label==='JACKPOT'){val.textContent='★ JACKPOT ★';sub.textContent='+500 PUNKTE!';}
      else if(won.label==='LEER'){val.textContent='- LEER -';sub.textContent='';}
      else if(won.label==='FLUCH'){val.textContent='† FLUCH †';sub.textContent='-50 PUNKTE';}
      else{val.textContent='+'+won.prize+' PTS';sub.textContent='';}

      spinning=false;
      document.getElementById('spinBtn').disabled=false;
      document.getElementById('spinBtn').textContent='► DREHEN';
      document.getElementById('pointer').classList.remove('active');
    }
  }
  requestAnimationFrame(anim);
}

buildWheel();buildOrbs();
</script>
</body>
</html>
